<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seite nicht gefunden &mdash; machsleicht.de</title>
  <meta name="description" content="Diese Seite existiert leider nicht. Zur&uuml;ck zur Startseite von machsleicht.de.">
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=Fraunces:opsz,wght@9..144,700;9..144,900&display=swap" rel="stylesheet">
  <style>
    :root{--a:#E8873D;--d:#2D2319;--m:#6B5D52;--l:#EDE6DE;--bg:#FFFAF5;--w:#FFF8F0;--f:'DM Sans',system-ui,sans-serif;--fd:'Fraunces',Georgia,serif}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--f);color:var(--d);background:var(--w);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
    a{color:var(--a);text-decoration:none}a:hover{text-decoration:underline}
    .wrap{max-width:520px;margin:0 auto;padding:80px 20px 60px;text-align:center;flex:1;display:flex;flex-direction:column;justify-content:center}
    .code{font-family:var(--fd);font-size:96px;font-weight:900;color:var(--l);line-height:1}
    h1{font-family:var(--fd);font-size:26px;font-weight:900;margin:12px 0 16px}
    p{font-size:15px;line-height:1.7;color:var(--m);margin-bottom:24px}
    .btn{display:inline-block;background:var(--a);color:#fff;padding:14px 32px;border-radius:99px;font-weight:700;font-size:15px;text-decoration:none;transition:background 0.2s}
    .btn:hover{background:#C46A1D;text-decoration:none}
  </style>
  <script async src="https://plausible.io/js/pa-2v7iyzPVQbQ8l6ya79jtE.js"></script>
  <script>
  window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
  plausible.init()
  </script>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>Ups &mdash; hier ist nichts.</h1>
    <p>Die Seite, die du suchst, gibt es leider nicht (mehr). Vielleicht hat sich die Adresse ge&auml;ndert oder du hast dich vertippt.</p>
    <a href="/" class="btn">Zur&uuml;ck zur Startseite</a>
  </div>
  <footer style="text-align:center;padding:16px 0;border-top:1px solid var(--l)">
    <p style="font-size:12px;color:var(--m)">&copy; 2026 machsleicht.de &middot; <a href="/impressum">Impressum</a> &middot; <a href="/datenschutz">Datenschutz</a> &middot; <a href="/transparenz">Transparenz</a></p>
  </footer>
</body>
</html>
