<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rohre verbinden — Baustelle</title>
<link rel="stylesheet" href="core/core.css?v=20260708">
<style>
  /* E3 Verbinden: Rohrknoten der Reihe nach verbinden -> Wasser fliesst -> Foto-Slot-Reveal. Auf Shared Core. */
  :root{--bg1:#1d2a38;--bg2:#33536e;--fg:#fff;--accent:#f2b21a;--accent-dk:#b87f00;--ink:#10202c;--pipe:#3aa0e0}
  .pill{background:rgba(255,255,255,.14);padding:6px 12px;border-radius:999px}
  .board{position:relative;width:100%;aspect-ratio:1;border-radius:16px;overflow:hidden;background:linear-gradient(160deg,#16314a,#0e2235);box-shadow:0 12px 30px rgba(0,0,0,.5);touch-action:manipulation}
  .board::before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(120,180,230,.13) 1px,transparent 1px),linear-gradient(90deg,rgba(120,180,230,.13) 1px,transparent 1px);background-size:30px 30px}
  .board svg{position:absolute;inset:0;width:100%;height:100%;transition:opacity .5s ease}
  /* Foto hinter der Leitung: wird mit jedem Anschluss klarer (Reveal an Mechanik gekoppelt) */
  .cphoto{position:absolute;inset:0;background-image:var(--photo);background-size:cover;background-position:center;opacity:0;filter:blur(16px) saturate(.5) brightness(.6);transition:opacity .6s ease,filter .6s ease;pointer-events:none}
  .node{cursor:pointer}
  .node circle.ring{fill:#22384a;stroke:#7c93a6;stroke-width:3;transition:stroke .2s,fill .2s}
  .node circle.bolt{fill:#9fb1c0}
  .node.lit circle.ring{fill:#1b5b86;stroke:var(--pipe)}
  .node.lit circle.bolt{fill:var(--pipe);filter:drop-shadow(0 0 5px var(--pipe))}
  .node.next circle.ring{stroke:#ffe08a;animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{stroke-width:3}50%{stroke-width:6}}
  .node text{fill:#cfe2f2;font-size:11px;font-weight:800;text-anchor:middle;dominant-baseline:central;pointer-events:none}
  #pipe{fill:none;stroke:var(--pipe);stroke-width:7;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 0 5px rgba(58,160,224,.6));opacity:.92}
  #pipe.flow{stroke-dasharray:10 8;animation:flow .7s linear infinite}
  @keyframes flow{to{stroke-dashoffset:-36}}
  .board.shake{animation:sh .25s}@keyframes sh{0%,100%{transform:translateX(0)}33%{transform:translateX(-6px)}66%{transform:translateX(6px)}}
  /* Story-Outro: Reaktion auf dem Reveal (tap-getaktet) */
  .storyOut{position:absolute;left:50%;bottom:6%;transform:translateX(-50%);background:rgba(255,255,255,.95);color:#10202c;font-weight:800;font-size:15px;padding:10px 16px;border-radius:14px;box-shadow:0 6px 16px rgba(0,0,0,.35);opacity:0;transition:opacity .4s ease .7s;z-index:7;max-width:88%;text-align:center;pointer-events:none}
  .storyOut.on{opacity:1}
  .storyOut.on::after{content:" ▸";opacity:.65;animation:blinkA 1.2s infinite} /* Tap-Affordanz: weiter per Tipp */
  @keyframes blinkA{50%{opacity:.15}}
  /* Magic-Moment: der Bauleiter (Foto) taucht aus der fertigen Leitung auf, flitzt -> antippen faengt -> scharf + huepft, dann flutet er die ganze Szene */
  .magicFly{position:absolute;left:50%;top:50%;width:120px;height:120px;margin:-60px 0 0 -60px;border-radius:50%;border:5px solid var(--accent);background-image:var(--photo);background-size:cover;background-position:center;background-color:#10202c;opacity:0;filter:blur(20px);transform:scale(.5);transition:opacity .3s;z-index:8;pointer-events:none;cursor:pointer}
  .magicFly.flit{opacity:1;pointer-events:auto;animation:mflit 1.4s ease-in-out infinite}
  .magicFly.caught{opacity:1;pointer-events:none;animation:none;filter:blur(0);box-shadow:0 6px 20px rgba(0,0,0,.35),0 0 30px 8px rgba(58,160,224,.6);transition:transform .5s cubic-bezier(.3,1.4,.5,1),filter .55s;transform:scale(1.5)}
  .magicFly.caught.joy{animation:mjoy2 .5s ease-in-out 4}
  .magicFly::after{content:"🔧";position:absolute;bottom:-10px;right:-8px;font-size:26px}
  @keyframes mflit{0%,100%{transform:translate(0,0)}25%{transform:translate(38px,-30px)}50%{transform:translate(-34px,22px)}75%{transform:translate(28px,26px)}}
  @keyframes mjoy2{0%,100%{transform:scale(1.5)}50%{transform:scale(1.62) translateY(-12px)}}
  .mhint{position:absolute;left:50%;bottom:8%;transform:translateX(-50%);background:rgba(6,40,59,.82);color:#cfe8fa;font-weight:800;font-size:14px;padding:6px 14px;border-radius:999px;opacity:0;transition:opacity .3s;z-index:9;pointer-events:none;white-space:nowrap}
  .mhint.on{opacity:1}
  /* Reveal */
  .invite{width:100%;background:linear-gradient(170deg,#fff6df,#ffe9b0);color:var(--ink);border-radius:20px;padding:22px;box-shadow:0 14px 40px rgba(0,0,0,.4);text-align:center;border:5px solid var(--accent-dk);position:relative}
  .invite::before{content:"💧 WASSER MARSCH 💧";position:absolute;top:-1px;left:0;right:0;background:var(--pipe);color:#06283b;font-weight:900;font-size:12px;letter-spacing:1px;padding:3px 0;border-radius:14px 14px 0 0}
  .hero{width:140px;height:140px;border-radius:50%;margin:18px auto 6px;border:5px solid var(--accent);background-image:var(--photo);background-size:cover;background-position:center;background-color:#10202c;box-shadow:0 8px 20px rgba(0,0,0,.3);position:relative;animation:pop .6s cubic-bezier(.3,1.5,.5,1)}
  .hero::after{content:"🔧";position:absolute;bottom:-8px;right:-10px;font-size:34px}
  @keyframes pop{from{transform:scale(.3) rotate(-8deg);opacity:0}to{transform:none;opacity:1}}
  .invite h2{font-size:23px;margin:6px 0 2px}.invite .who{font-size:17px;font-weight:800;color:var(--accent-dk)}
  .invite dl{display:grid;grid-template-columns:auto 1fr;gap:8px 12px;text-align:left;margin:14px auto;max-width:240px;font-size:16px}.invite dt{font-size:20px}.invite dd{font-weight:700}
</style>
</head>
<body>
<div class="wrap">
  <section class="scene on" id="s-intro">
    <div class="big" id="pIcon">👷</div>
    <h1 id="pTitle">Einsatz für dich!</h1>
    <p class="sub" id="pText">…</p>
    <button class="btn" id="nextPan">Weiter ▸</button>
    <button class="btn" id="skipPan" style="background:rgba(255,255,255,.16);font-size:14px;padding:8px 20px">Überspringen ▸▸</button>
    <div id="introForm" style="width:100%;flex-direction:column;align-items:center;gap:12px;display:none">
      <input id="gname" placeholder="Dein Name (optional)" maxlength="20" autocomplete="off" style="width:80%;max-width:240px;padding:11px 14px;border:0;border-radius:12px;font-size:16px;text-align:center;background:rgba(255,255,255,.92);color:#2a2a2a;outline:none">
      <button class="btn" id="startBtn">Leitung legen 🔧</button>
    </div>
  </section>

  <section class="scene" id="s-game">
    <div class="hud"><span class="pill">Anschlüsse <b id="cnt">0</b>/<b id="tot">7</b></span></div>
    <div class="board" id="board"><div class="cphoto" id="cphoto"></div><svg id="svg" viewBox="0 0 300 300"><polyline id="pipe" points=""></polyline><g id="nodes"></g></svg><div class="magicFly" id="magicFly"></div><div class="mhint" id="mhint"></div><div class="storyOut" id="storyOut"></div></div>
    <p class="sub" id="hint">Tippe den blinkenden Anschluss.</p>
  </section>

  <section class="scene" id="s-win">
    <div class="invite">
      <div class="hero"></div>
      <h2 id="winTitle">Wasser marsch!</h2>
      <p class="who" id="winWho">Die Leitung steht — Wasser marsch! Komm zur Baustellen-Party:</p>
      <dl><dt>📅</dt><dd>Samstag, 11. Juli</dd><dt>🕒</dt><dd>15:00 Uhr</dd><dt>📍</dt><dd>Bauplatz, Kranstraße 4</dd></dl>
      <button class="btn ja" id="rsvpBtn">👷 Ich helfe mit!</button>
      <p class="note">(Demo — im Original geht die Zusage per WhatsApp an die Eltern)</p>
    </div>
  </section>
</div>
<div class="confetti" id="confetti"></div>
<script src="core/core.js?v=20260708"></script>
<script>
const NOPHOTO="data:image/svg+xml,"+encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><rect width='200' height='200' fill='#0e2235'/><g fill='none' stroke='#3aa0e0' stroke-width='10' stroke-linecap='round'><path d='M30 50 h70 v50 h70'/><path d='M100 100 v60 h40'/></g><g fill='#9fb1c0'><circle cx='30' cy='50' r='9'/><circle cx='100' cy='50' r='9'/><circle cx='100' cy='100' r='9'/><circle cx='170' cy='100' r='9'/><circle cx='100' cy='160' r='9'/><circle cx='140' cy='160' r='9'/></g><circle cx='150' cy='60' r='14' fill='#f2b21a'/><path d='M144 60 h12 M150 54 v12' stroke='#10202c' stroke-width='3'/></svg>`);
const THEME={ photo:'/birthday-photo.jpg' };
const HAS_PHOTO=setPhoto(THEME,NOPHOTO);
const CC=['#3aa0e0','#f2b21a','#37c46e','#fff','#b87f00'];
const SCALE=[392,440,494,587,659,740,831,932];
const sfx={
  connect(i){const t=AC().currentTime;note(SCALE[Math.min(i,SCALE.length-1)],t,0.14,{type:'sine',vol:0.13});noise(t,0.05,{vol:0.04,freq:600,filter:'lowpass'});},
  wrong(){note(190,AC().currentTime,0.14,{type:'triangle',vol:0.1,glideTo:140});},
  flow(){const t=AC().currentTime;noise(t,0.8,{vol:0.1,freq:520,filter:'lowpass'});note(300,t,0.6,{type:'sine',vol:0.05,glideTo:520});},
  win(){const t=AC().currentTime;[392,523,659,784].forEach((f,i)=>note(f,t+i*0.1,0.34,{type:'triangle',vol:0.15}));},
  ding(){const t=AC().currentTime;note(880,t,0.12,{type:'sine',vol:0.15});note(1320,t+0.09,0.24,{type:'sine',vol:0.13});}
};
const NODES_FULL=[[45,60],[150,60],[150,130],[235,130],[235,215],[120,215],[120,265]]; // 7 Rohr-Anschlüsse — physische Rohr-Route (Trace), Reihenfolge folgt dem Rohr (kein Merk-Modus, das passt nur zu freier Reihenfolge)
const NODES=NODES_FULL.slice(0, ageNum()<=6?5:ageNum()<=9?6:7); // Alters-Staffel: 5/6/7 Anschlüsse — Prefix bleibt eine gueltige orthogonale (kuerzere) Rohr-Route
let next=0,done=false,magicPhase=false,finT=null;
let outroStep=0, outroT=null, beat2='', winAt=0;
const GUEST=(()=>{ const s=(new URLSearchParams(location.search).get('g')||'').trim(); return s.length<=20?s:''; })(); // Gastname für den Twist-Beat; >20 verwerfen
function kidCap(){ const k=kid(); return k.charAt(0).toUpperCase()+k.slice(1); } // Fallback 'das Geburtstagskind' satzinitial groß
function guestNow(){ const f=document.getElementById('gname'); const v=((f&&f.value)||'').trim(); return (v&&v.length<=20)?v:GUEST; } // Namensfeld vor URL-Param
// Story-Intro: 3 tippbare Panels — falsche Fährte (wer leitet die Baustelle?) fürs Twist-Finale
const PANELS=[
  {i:'👷',t:'Einsatz für dich!',x:'Auf der großen Baustelle wartet heimlich jemand ganz Wichtiges — aber die Wasserleitung ist noch gar nicht verlegt!'},
  {i:'🔧',t:'Verbinde die Rohre!',x:'Tippe die leuchtenden Anschlüsse der Reihe nach — Stück für Stück wächst die Leitung.'},
  {i:'💧',t:'Wer leitet die Baustelle?',x:'Wenn alles dicht ist und das Wasser läuft, zeigt sich, wer hier das Kommando hat.'}
];
let pIdx=0;
function showPan(){ const p=PANELS[pIdx]; $('#pIcon').textContent=p.i; $('#pTitle').textContent=p.t; $('#pText').textContent=p.x; const last=pIdx>=PANELS.length-1; $('#nextPan').style.display=last?'none':''; $('#skipPan').style.display=last?'none':''; $('#introForm').style.display=last?'flex':'none'; }
function sharpen(frac){ const p=$('#cphoto'); if(!p||magicPhase)return; const f=Math.max(0,Math.min(1,frac)); p.style.opacity=(f<=0?0:(0.12+0.3*f*f)).toFixed(2); p.style.filter='blur('+(17-5*f*f).toFixed(1)+'px) saturate(.5) brightness(.55)'; } // gedeckelt: Foto hinter der Leitung bleibt unscharfe Silhouette bis zum Fang (reveal-last)
function floodPhoto(){ const p=$('#cphoto'); if(!p)return; p.style.transition='opacity .7s ease,filter .7s ease'; p.style.opacity='1'; p.style.filter='blur(0) saturate(1) brightness(1)'; } // der gefangene Bauleiter flutet die ganze Szene scharf
function build(){
  next=0;done=false;magicPhase=false;clearTimeout(finT);clearTimeout(outroT);outroStep=0;beat2='';winAt=0;
  $('#cnt').textContent=0;$('#tot').textContent=NODES.length;$('#pipe').setAttribute('points','');$('#pipe').classList.remove('flow');
  $('#svg').style.opacity='';$('#mhint').classList.remove('on');$('#storyOut').classList.remove('on');
  const mf=$('#magicFly');mf.classList.remove('flit','caught','joy');mf.style.opacity='';mf.style.transition='';$('#cphoto').style.transition='';
  [...document.querySelectorAll('#s-game button, #s-game .hud')].forEach(b=>b.style.visibility='');
  sharpen(0);
  const g=$('#nodes');g.innerHTML='';
  NODES.forEach((p,i)=>{
    const el=document.createElementNS('http://www.w3.org/2000/svg','g');el.setAttribute('class','node'+(i===0?' next':''));el.dataset.i=i;
    el.innerHTML=`<circle class="ring" cx="${p[0]}" cy="${p[1]}" r="14"></circle><circle class="bolt" cx="${p[0]}" cy="${p[1]}" r="5"></circle>`;
    el.addEventListener('click',()=>tap(i));
    g.appendChild(el);
  });
}
function tap(i){
  if(done)return;
  if(i!==next){ sfx.wrong();vib([25,30,25]);$('#board').classList.add('shake');setTimeout(()=>$('#board').classList.remove('shake'),250);return; }
  const node=$('.node[data-i="'+i+'"]');node.classList.add('lit');node.classList.remove('next');
  const pts=$('#pipe').getAttribute('points');$('#pipe').setAttribute('points',(pts?pts+' ':'')+NODES[i][0]+','+NODES[i][1]);
  sfx.connect(i);vib(10);next++;$('#cnt').textContent=next;sharpen(next/NODES.length);
  if(next<NODES.length){ $('.node[data-i="'+next+'"]').classList.add('next'); }
  else win();
}
function win(){ // Leitung dicht: Wasser laeuft, Rohr fadet -> der Bauleiter (Foto) taucht aus der Leitung auf und flitzt (Magic-Moment)
  done=true;$('#hint').textContent='Wasser läuft …';$('#pipe').classList.add('flow');sfx.flow();vib([20,40]);
  [...document.querySelectorAll('#s-game button, #s-game .hud')].forEach(b=>b.style.visibility='hidden'); // Buttons UND HUD im Finale weg — Reveal bleibt clean
  setTimeout(()=>{
    $('#svg').style.opacity='0'; $('#hint').textContent='';
    const mf=$('#magicFly'); mf.classList.add('flit'); magicPhase=true;
    mf.addEventListener('click',catchMagic,{once:true});
    finT=setTimeout(()=>{ if(magicPhase)catchMagic(); },5000); // No-Fail: faengt von selbst
    $('#mhint').textContent='Der Bauleiter taucht aus der Leitung auf — fang ihn!'; $('#mhint').classList.add('on');
  }, 750);
}
function catchMagic(){ if(!magicPhase)return; magicPhase=false; clearTimeout(finT);
  const mf=$('#magicFly'); mf.classList.remove('flit'); mf.classList.add('caught'); $('#mhint').classList.remove('on');
  sfx.win(); vib([20,40,20,40,80]);
  setTimeout(()=>mf.classList.add('joy'),560);
  setTimeout(startOutro,1650);
}
function startOutro(){ // der gefangene Bauleiter flutet die ganze Szene scharf, dann die 2 Story-Beats (tap-getaktet)
  floodPhoto(); const mf=$('#magicFly'); mf.style.transition='opacity .6s ease'; mf.style.opacity='0'; // magicFly verschmilzt ins Vollbild
  confetti(CC); // Konfetti AM Reveal, nicht auf der Karte
  const g=guestNow(); const so=$('#storyOut');
  if(HAS_PHOTO && !document.documentElement.hasAttribute('data-photo-failed')){ so.textContent='Das Wasser rauscht — '+kid()+' leitet die Baustelle! 🎉'; beat2=kidCap()+' strahlt: „Na endlich'+(g?', '+g:'')+'! Auf dich hab ich gewartet!“'; } // Beat 1 Identität (Nominativ, fallback-sicher, löst die Intro-Frage), Beat 2 Rollenumkehr
  else { so.textContent='Das Wasser rauscht durch die frische Leitung! 🎉'; beat2='Und '+kid()+' wartet auf der Baustelle auf dich'+(g?', '+g:'')+'!'; } // nofoto: Rätsel aufgelöst, kid() als Gastgeber (kein Spiel-Verb)
  so.classList.add('on'); winAt=Date.now(); outroStep=1; outroT=setTimeout(advanceOutro,11000);
  if(HAS_PHOTO && !document.documentElement.hasAttribute('data-photo-failed')){ $('#winWho').textContent=`Deine Leitung steht dicht — und dahinter wartet ${kid()}! Komm zur Baustellen-Party:`; } else {$('#winTitle').textContent='Wasser marsch!';$('#winWho').textContent=`Deine Leitung ist dicht, das Wasser rauscht! ${kidCap()} lädt dich zur Baustellen-Party ein:`;} guestName();
}
function advanceOutro(){ if(!outroStep || Date.now()-winAt<1150)return; clearTimeout(outroT); winAt=Date.now(); // Grace 1150ms: volle Beat-1-Einblendung, kein Reflex-Tap überspringt Reveal+Beats
  if(outroStep===1){ outroStep=2; $('#storyOut').textContent=beat2; vib(8); outroT=setTimeout(advanceOutro,14000); }
  else { outroStep=0; show('s-win'); } } // tap-getaktet (Fallback Beat 1 11s, Beat 2 14s); Konfetti nur AM Reveal
function tip(){ if(magicPhase){ catchMagic(); return; } if(!done && document.querySelector('.node[data-i="'+next+'"]')) tap(next); } // Tipp: nächsten Anschluss verbinden; im Magic-Moment faengt der Tipp den Bauleiter
$('#nextPan').addEventListener('click',()=>{ if(pIdx<PANELS.length-1){ pIdx++; showPan(); } });
$('#skipPan').addEventListener('click',()=>{ pIdx=PANELS.length-1; showPan(); });
$('#board').addEventListener('click',()=>{ if(magicPhase){ catchMagic(); return; } if(done && outroStep){ advanceOutro(); } }); // Magic-Moment: Tap faengt den Bauleiter; danach taktet der Tap die Story-Beats
$('#startBtn').addEventListener('click',()=>{ AC(); build();show('s-game');$('#hint').textContent='Tippe den blinkenden Anschluss.'; }); // AC(): iOS-Audio-Unlock per Geste
showPan();
$('#rsvpBtn').addEventListener('click',e=>{e.target.textContent='Zusage gesendet ✓';e.target.disabled=true;confetti(CC);sfx.ding();});
</script>
</body>
</html>
