<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sternbild — Weltraum</title>
<link rel="stylesheet" href="core/core.css?v=20260708">
<style>
  /* E3 Verbinden/Trace — Sterne verbinden -> Foto-Reveal. Weltraum. Auf Shared Core. Story-Muster v2. */
  :root{--bg1:#070b1c;--bg2:#1b2a55;--fg:#fff;--accent:#6aa8ff;--accent-dk:#2c63b8;--ink:#04122e;--gold:#ffd866}
  .big{filter:drop-shadow(0 0 14px #6aa8ff)}
  .pill{background:rgba(255,255,255,.14);padding:6px 12px;border-radius:999px}
  .sky{position:relative;width:100%;aspect-ratio:1;border-radius:16px;overflow:hidden;background:radial-gradient(circle at 30% 20%,#26356b,#070b1c 70%);box-shadow:0 12px 30px rgba(0,0,0,.5);touch-action:manipulation}
  .sky svg{position:absolute;inset:0;width:100%;height:100%;transition:opacity .5s ease}
  /* Foto zwischen den Sternen: schimmert mit jedem Stern deutlicher; im Finale faden die Sterne -> Foto flutet (Reveal = Höhepunkt) */
  .cphoto{position:absolute;inset:0;background-image:var(--photo);background-size:cover;background-position:center;opacity:0;filter:blur(16px) saturate(.5) brightness(.55);transition:opacity .6s ease,filter .6s ease;pointer-events:none}
  .star{cursor:pointer}
  .star circle{fill:#9fb6e8;transition:fill .2s,r .2s}
  .star.lit circle{fill:var(--gold);filter:drop-shadow(0 0 6px var(--gold))}
  .star.next circle{fill:#fff;stroke:var(--gold);stroke-width:2.5;animation:pulse 1s infinite} /* statischer Ring bleibt auch bei reduced-motion sichtbar, wenn die Animation aus ist */
  @keyframes pulse{0%,100%{r:12}50%{r:15}}
  .star.preview circle{fill:var(--gold);filter:drop-shadow(0 0 8px var(--gold))} /* Vorschau: Reihenfolge blitzt einmal auf */
  .bgstar{fill:#fff;opacity:.5}
  #line{fill:none;stroke:var(--gold);stroke-width:3;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 0 5px var(--gold))}
  .sky.shake{animation:sh .25s}@keyframes sh{0%,100%{transform:translateX(0)}33%{transform:translateX(-6px)}66%{transform:translateX(6px)}}
  /* Story-Outro: Reaktion auf dem Reveal (tap-getaktet) */
  .storyOut{position:absolute;left:50%;bottom:6%;transform:translateX(-50%);background:rgba(255,255,255,.94);color:#16233f;font-weight:800;font-size:15px;padding:10px 16px;border-radius:14px;box-shadow:0 6px 16px rgba(0,0,0,.35);opacity:0;transition:opacity .4s ease .7s;z-index:7;max-width:88%;text-align:center;pointer-events:none}
  .storyOut.on{opacity:1}
  .storyOut.on::after{content:" ▸";opacity:.65;animation:blinkA 1.2s infinite} /* Tap-Affordanz: weiter per Tipp */
  @keyframes blinkA{50%{opacity:.15}}
  /* Magic-Moment: der Captain (unscharfes Foto) funkelt aus dem Sternbild, flitzt -> antippen faengt -> scharf + huepft */
  .magicFly{position:absolute;left:50%;top:44%;width:112px;height:112px;margin:-56px 0 0 -56px;border-radius:50%;border:5px solid var(--gold);background-image:var(--photo);background-size:cover;background-position:center;background-color:#04122e;opacity:0;filter:blur(20px);transform:scale(.5);transition:opacity .3s;z-index:6;pointer-events:none;cursor:pointer}
  .magicFly.flit{opacity:1;pointer-events:auto;animation:mflit 1.4s ease-in-out infinite}
  @keyframes mflit{0%{transform:translate(0,0) scale(.5)}18%{transform:translate(-84px,-70px) scale(.54)}36%{transform:translate(80px,-54px) scale(.5)}54%{transform:translate(-70px,48px) scale(.54)}72%{transform:translate(78px,32px) scale(.5)}100%{transform:translate(0,0) scale(.5)}}
  .magicFly.caught{opacity:1;pointer-events:none;animation:none;filter:blur(0);box-shadow:0 0 44px 13px rgba(255,216,102,.85);transition:transform .5s cubic-bezier(.3,1.4,.5,1),filter .55s;transform:scale(1.7)}
  .magicFly.caught.joy{animation:mjoy2 .5s ease-in-out 4}
  @keyframes mjoy2{0%,100%{transform:scale(1.7)}50%{transform:translateY(-11px) scale(1.8)}}
  .magicFly::after{content:"⭐";position:absolute;top:-16px;right:-8px;font-size:26px}
  /* Reveal */
  .invite{width:100%;background:linear-gradient(170deg,#f3f7ff,#dce6fb);color:#16233f;border-radius:20px;padding:22px;box-shadow:0 14px 40px rgba(0,0,0,.4);text-align:center;border:3px solid var(--accent-dk)}
  .hero{width:140px;height:140px;border-radius:50%;margin:0 auto 6px;border:5px solid var(--gold);background-image:var(--photo);background-size:cover;background-position:center;box-shadow:0 0 26px rgba(255,216,102,.7);position:relative;animation:pop .6s cubic-bezier(.3,1.5,.5,1)}
  .hero::after{content:"⭐";position:absolute;top:-20px;right:-8px;font-size:34px}
  @keyframes pop{from{transform:scale(.3) rotate(-10deg);opacity:0}to{transform:none;opacity:1}}
  .invite h2{font-size:23px;margin:6px 0 2px}.invite .who{font-size:17px;font-weight:800;color:var(--accent-dk)}
  .invite dl{display:grid;grid-template-columns:auto 1fr;gap:8px 12px;text-align:left;margin:14px auto;max-width:240px;font-size:16px}.invite dt{font-size:20px}.invite dd{font-weight:700}
</style>
</head>
<body>
<div class="wrap">
  <section class="scene on" id="s-intro">
    <div class="big" id="pIcon">🛰️</div>
    <h1 id="pTitle">Kommando an dich!</h1>
    <p class="sub" id="pText">…</p>
    <button class="btn" id="nextPan">Weiter ▸</button>
    <button class="btn" id="skipPan" style="background:rgba(255,255,255,.16);font-size:14px;padding:8px 20px">Überspringen ▸▸</button>
    <div id="introForm" style="width:100%;flex-direction:column;align-items:center;gap:12px;display:none">
      <input id="gname" placeholder="Dein Name (optional)" maxlength="20" autocomplete="off" style="width:80%;max-width:240px;padding:11px 14px;border:0;border-radius:12px;font-size:16px;text-align:center;background:rgba(255,255,255,.92);color:#2a2a2a;outline:none">
      <button class="btn" id="startBtn">Sterne verbinden 🛰️</button>
    </div>
  </section>

  <section class="scene" id="s-game">
    <div class="hud"><span class="pill">Sterne <b id="cnt">0</b>/<b id="tot">7</b></span></div>
    <div class="sky" id="sky"><div class="cphoto" id="cphoto"></div><svg id="svg" viewBox="0 0 300 300"><polyline id="line" points=""></polyline><g id="stars"></g></svg><div class="magicFly" id="magicFly"></div><div class="storyOut" id="storyOut"></div></div>
    <p class="sub" id="hint">Tippe den leuchtenden Stern.</p>
  </section>

  <section class="scene" id="s-win">
    <div class="invite">
      <div class="hero"></div>
      <h2 id="winTitle">Konstellation komplett!</h2>
      <p class="who" id="winWho">Die Konstellation ist komplett! Komm zur Weltraum-Party:</p>
      <dl><dt>📅</dt><dd>Samstag, 11. Juli</dd><dt>🕒</dt><dd>15:00 Uhr</dd><dt>📍</dt><dd>Raumstation (Stadtpark)</dd></dl>
      <button class="btn ja" id="rsvpBtn">🚀 Ich starte mit!</button>
      <p class="note">(Demo — im Original geht die Zusage per WhatsApp an die Eltern)</p>
    </div>
  </section>
</div>
<div class="confetti" id="confetti"></div>
<script src="core/core.js?v=20260713"></script>
<script>
const NOPHOTO="data:image/svg+xml,"+encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><rect width='200' height='200' fill='#0b1430'/><g fill='#fff' opacity='.7'><circle cx='40' cy='40' r='2'/><circle cx='160' cy='50' r='2'/><circle cx='60' cy='150' r='2'/><circle cx='150' cy='160' r='2'/></g><path d='M100 36 c20 18 26 50 0 96 c-26-46-20-78 0-96z' fill='#e8eefc'/><circle cx='100' cy='84' r='12' fill='#6aa8ff'/><path d='M84 110 l-16 22 l16 -4 z M116 110 l16 22 l-16 -4 z' fill='#c9d6f5'/><path d='M92 132 q8 18 16 0' fill='#ff8a3c'/></svg>`);
const THEME={ photo:'/spiele/core/demo-kid.jpg' };
const HAS_PHOTO=setPhoto(THEME,NOPHOTO);
const CC=['#6aa8ff','#ffd866','#37c46e','#fff','#a35cff'];
const SCALE=[523,587,659,784,880,988,1047,1175];
const sfx={connect(i){note(SCALE[Math.min(i,SCALE.length-1)],AC().currentTime,0.14,{type:'sine',vol:0.14});},wrong(){note(200,AC().currentTime,0.14,{type:'triangle',vol:0.1,glideTo:150});},win(){const t=AC().currentTime;[523,659,784,1047].forEach((f,i)=>note(f,t+i*0.1,0.34,{type:'triangle',vol:0.15}));[1568,2093].forEach((f,i)=>note(f,t+0.46+i*0.09,0.5,{type:'sine',vol:0.07}));},ding(){const t=AC().currentTime;note(880,t,0.12,{type:'sine',vol:0.15});note(1320,t+0.09,0.24,{type:'sine',vol:0.13});}};
const STARS=[[60,70],[230,140],[110,200],[185,80],[55,150],[170,170],[120,50]]; // 7 Sterne — Reihenfolge quer über die Fläche gestreut (KEIN Sweep), sonst wäre der Merk-Modus gefälscht
const NSTAR=(ageNum()<=6?5:ageNum()<=9?6:7); // Alters-Staffel: weniger Sterne für Jüngere
const MEM=(ageNum()>=7); // ab 7: Merk-Modus (Nummern weg, Reihenfolge aus dem Kopf)
const HELP_MS=(ageNum()>=10?4200:3200); // No-Fail-Netz: nach dieser Wartezeit blinkt der nächste Stern DOCH — jeder schafft es
const NW={5:'Fünf',6:'Sechs',7:'Sieben'}[NSTAR], nw={5:'fünf',6:'sechs',7:'sieben'}[NSTAR]; // Story-Text muss zur Alters-Staffel (NSTAR) passen — nicht hart „sieben"
const GUEST=(()=>{ const s=(new URLSearchParams(location.search).get('g')||'').trim(); return s.length<=20?s:''; })(); // Gastname für den Twist-Beat; >20 verwerfen
// Story-Intro: 3 tippbare Panels — falsche Fährte (der geheime Captain) fürs Twist-Finale
const PANELS=[
  {i:'🛰️',t:'Kommando an dich!',x:'Irgendwo da draußen wartet der geheime Captain dieser Sternen-Mission. Aber die Konstellation ist noch gar nicht verbunden!'},
  {i:'✨',t:'Verbinde die Sterne!',x:'Tippe die leuchtenden Sterne der Reihe nach — Stück für Stück entsteht das Sternbild.'},
  {i:'⭐',t:NW+' Sterne!',x:'Wenn alle '+nw+' verbunden sind, zeigt die Konstellation, wer da auf dich wartet.'}
];
let pIdx=0;
function showPan(){ const p=PANELS[pIdx]; $('#pIcon').textContent=p.i; $('#pTitle').textContent=p.t; $('#pText').textContent=p.x; const last=pIdx>=PANELS.length-1; $('#nextPan').style.display=last?'none':''; $('#skipPan').style.display=last?'none':''; $('#introForm').style.display=last?'flex':'none'; }
$('#nextPan').addEventListener('click',()=>{ AC(); pIdx=Math.min(pIdx+1,PANELS.length-1); showPan(); vib(6); });
$('#skipPan').addEventListener('click',()=>{ AC(); pIdx=PANELS.length-1; showPan(); });
showPan();
function kidCap(){ const k=kid(); return k.charAt(0).toUpperCase()+k.slice(1); } // Fallback 'das Geburtstagskind' satzinitial groß
function guestNow(){ const f=document.getElementById('gname'); const v=((f&&f.value)||'').trim(); return (v&&v.length<=20)?v:GUEST; } // Namensfeld vor URL-Param
let next=0,done=false,previewing=false,helpT=null,magicPhase=false,finT=null;
let outroStep=0, outroT=null, beat2='', winAt=0;
function advanceOutro(){ if(!outroStep || Date.now()-winAt<1150)return; clearTimeout(outroT); winAt=Date.now(); // Grace 1150ms: deckt volle Beat-1-Einblendung, kein Reflex-Tap überspringt Reveal+Beats
  if(outroStep===1){ outroStep=2; $('#storyOut').textContent=beat2; vib(8); outroT=setTimeout(advanceOutro,14000); }
  else { outroStep=0; show('s-win'); confetti(CC); } } // tap-getaktet (Fallback Beat 1 11s, Beat 2 14s für 60-WpM-Leser)
function sharpen(frac){ const p=$('#cphoto'); if(!p||magicPhase)return; const f=Math.max(0,Math.min(1,frac)); p.style.opacity=(f<=0?0:Math.min(0.28,0.15+0.4*f*f)).toFixed(2); p.style.filter='blur('+Math.max(15,17*(1-f*f)).toFixed(1)+'px) saturate('+(0.5+0.5*f).toFixed(2)+') brightness('+(0.55+0.45*f).toFixed(2)+')'; } // Opacity+Blur f^2-gewichtet: Gesicht bleibt bis kurz vor Schluss verschleiert, Voll-Flut bei win() ist der Höhepunkt (schützt den Twist)
function build(){
  next=0;done=false;previewing=false;magicPhase=false;clearTimeout(helpT);clearTimeout(finT);$('#magicFly').classList.remove('flit','caught','joy');$('#cnt').textContent=0;$('#tot').textContent=NSTAR;$('#line').setAttribute('points','');sharpen(0);$('#svg').style.opacity='';
  const g=$('#stars');g.innerHTML=''; // Nummern generell verborgen — Führung rein übers Blinken; ab 7 aus dem Kopf
  // Hintergrund-Sterne
  for(let i=0;i<26;i++){const c=document.createElementNS('http://www.w3.org/2000/svg','circle');c.setAttribute('class','bgstar');c.setAttribute('cx',Math.random()*300);c.setAttribute('cy',Math.random()*300);c.setAttribute('r',(Math.random()*1.4+.4).toFixed(1));g.appendChild(c);}
  STARS.slice(0,NSTAR).forEach((p,i)=>{
    const el=document.createElementNS('http://www.w3.org/2000/svg','g');el.setAttribute('class','star'+(!MEM&&i===0?' next':''));el.dataset.i=i;
    el.innerHTML=`<circle cx="${p[0]}" cy="${p[1]}" r="12"></circle>`;
    el.addEventListener('click',()=>tap(i));
    g.appendChild(el);
  });
  if(MEM) preview(); // ab 7: erst die Reihenfolge zeigen, dann aus dem Kopf verbinden
}
function preview(){ previewing=true; $('#hint').textContent='Merk dir die Reihenfolge …'; let i=0;
  const iv=setInterval(()=>{ if(done){clearInterval(iv);return;} if(i>=NSTAR){ clearInterval(iv); previewing=false; $('#hint').textContent='Jetzt du — aus dem Kopf!'; armHint(); return; }
    const s=$('.star[data-i="'+i+'"]'); if(s){ s.classList.add('preview'); sfx.connect(i); const j=i; setTimeout(()=>{ const ss=$('.star[data-i="'+j+'"]'); if(ss)ss.classList.remove('preview'); },380); } i++; }, 470); }
function armHint(){ if(!MEM)return; clearTimeout(helpT); helpT=setTimeout(()=>{ if(done||previewing)return; const s=$('.star[data-i="'+next+'"]'); if(s)s.classList.add('next'); },HELP_MS); } // No-Fail-Netz: der richtige nächste Stern blinkt nach Wartezeit DOCH auf
function tap(i){
  if(done||previewing)return;
  if(i!==next){ sfx.wrong();vib([25,30,25]);$('#sky').classList.add('shake');setTimeout(()=>$('#sky').classList.remove('shake'),250); if(MEM){ const s=$('.star[data-i="'+next+'"]'); if(s)s.classList.add('next'); armHint(); } return; } // falsch = kein Verlieren; im Merk-Modus zeigt sich der richtige Stern als Hilfe
  clearTimeout(helpT);
  const star=$('.star[data-i="'+i+'"]');star.classList.add('lit');star.classList.remove('next');
  const pts=$('#line').getAttribute('points');$('#line').setAttribute('points',(pts?pts+' ':'')+STARS[i][0]+','+STARS[i][1]);
  sfx.connect(i);vib(10);next++;$('#cnt').textContent=next;sharpen(next/NSTAR);
  if(next<NSTAR){ if(!MEM) $('.star[data-i="'+next+'"]').classList.add('next'); else armHint(); }
  else win();
}
function win(){
  done=true;previewing=false;clearTimeout(helpT);$('#cphoto').style.opacity='0';$('#hint').textContent='Die Konstellation leuchtet auf …';vib([20,40,20,40,80]); // KEIN Frueh-Flood: scharfes Gesicht erst beim Fangen (Reveal-last)
  [...document.querySelectorAll('#s-game button')].forEach(b=>b.style.visibility='hidden'); // keine toten Buttons (Tipp) im Finale
  setTimeout(()=>{ // Sterne + Reveal buendeln sich ins flatternde Foto -> antippen faengt -> scharf + huepft. No-Fail (Auto-Catch 5s)
    $('#svg').style.opacity='0'; const p=$('#cphoto'); if(p) p.style.opacity='0';
    $('#hint').textContent='Der Captain funkelt heraus — fang ihn!'; const mf=$('#magicFly'); mf.classList.add('flit'); magicPhase=true; sfx.connect(3); vib(8);
    mf.addEventListener('click', catchMagic, {once:true});
    finT=setTimeout(()=>{ if(magicPhase) catchMagic(); }, 5000);
  }, 700);
}
function catchMagic(){ if(!magicPhase)return; magicPhase=false; clearTimeout(finT); const mf=$('#magicFly'); mf.classList.remove('flit'); mf.classList.add('caught'); $('#hint').textContent=''; sfx.win(); vib([20,40,20,40,80]);
  finT=setTimeout(()=>{ mf.classList.add('joy'); confetti(CC); vib([10,30,10]); // scharf + huepft vor Freude, Fanfare + Konfetti AM Reveal
    const g=guestNow(); const so=$('#storyOut');
    if(HAS_PHOTO && !document.documentElement.hasAttribute('data-photo-failed')){ so.textContent='Das Sternbild leuchtet: Der Captain ist '+kid()+'! 🎉'; beat2=kidCap()+' lacht: „Na endlich'+(g?', '+g:'')+'! Ich hab schon auf dich gewartet!“'; } // Beat 1 Identität, Beat 2 Rollenumkehr
    else { so.textContent='Das Sternbild leuchtet — eine funkelnde Rakete am Himmel! 🎉'; beat2='Und '+kid()+' wartet an der Raumstation auf dich'+(g?', '+g:'')+'!'; } // nofoto: kid() als Gastgeber
    so.classList.add('on'); winAt=Date.now(); outroStep=1; outroT=setTimeout(advanceOutro,11000);
    if(HAS_PHOTO && !document.documentElement.hasAttribute('data-photo-failed')){ $('#winTitle').textContent='Captain gefunden!'; $('#winWho').textContent=`Zwischen den Sternen erscheint der Captain — das ist ${kid()}! Komm zur Weltraum-Party:`; } else { $('#winTitle').textContent='Konstellation komplett!'; $('#winWho').textContent=`Das Sternbild ist komplett — ${kid()} lädt dich zur Weltraum-Party ein:`; } guestName();
  }, 620);
}
$('#sky').addEventListener('click',()=>{ if(magicPhase){ catchMagic(); return; } if(done && outroStep){ advanceOutro(); } }); // Magic-Moment: Tap faengt das Foto; danach taktet der Tap die Story-Beats
function tip(){ if(magicPhase){ catchMagic(); return; } if(!done && !previewing && document.querySelector('.star[data-i="'+next+'"]')) tap(next); } // Tipp: nächsten Stern verbinden; im Magic-Moment faengt er das Foto (Guard: nicht während Vorschau)
$('#startBtn').addEventListener('click',()=>{ AC(); outroStep=0; clearTimeout(outroT); $('#storyOut').classList.remove('on'); [...document.querySelectorAll('#s-game button')].forEach(b=>b.style.visibility=''); build(); show('s-game'); $('#hint').textContent=MEM?'Merk dir die Reihenfolge …':'Tippe den leuchtenden Stern.'; }); // AC(): iOS-Audio-Unlock; Hint MEM-abhaengig (im Merk-Modus setzt preview() ihn synchron, Start-Handler darf ihn nicht ueberschreiben — sonst 'tippe' waehrend Taps geguardet sind)
$('#rsvpBtn').addEventListener('click',e=>{e.target.textContent='Zusage gesendet ✓';e.target.disabled=true;confetti(CC);sfx.ding();});
</script>
</body>
</html>
