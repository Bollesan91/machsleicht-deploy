    :root{--a:#e07a3a;--al:#fef3eb;--ad:#c46a30;--d:#1a1a1a;--m:#777;--l:#f0ede8;--bg:#fafaf8;--w:#fdfcf9;--f:'DM Sans',system-ui,sans-serif;--fd:'Fraunces',Georgia,serif;--r:16px;--rs:12px}

    body{font-family:var(--f);color:var(--d);background:var(--w);min-height:100vh;-webkit-font-smoothing:antialiased}

    :focus-visible{outline:2px solid var(--a);outline-offset:2px;border-radius:4px}

    @media(min-width:500px){.row-fields{grid-template-columns:1fr 1fr}}

<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const{useState,useMemo,useCallback,useRef,useEffect}=React;
const toUpper=s=>s.toUpperCase();

function bestPosition(answer,letter){
  const n=toUpper(answer),t=toUpper(letter),p=[];
  for(let i=0;i<n.length;i++)if(n[i]===t)p.push(i);
  if(!p.length)return-1;
  const mid=n.length/2;
  p.sort((a,b)=>Math.abs(a-mid)-Math.abs(b-mid));
  return p[0];
}

const BEISPIEL={solution:'PIRAT',rows:[
  {question:'Buntes Tier das sprechen kann',answer:'Papagei'},
  {question:'Damit segeln Piraten übers Meer',answer:'Schiff'},
  {question:'Damit sieht man weit entfernte Schiffe',answer:'Fernglas'},
  {question:'Das tragen Piraten über einem Auge',answer:'Augenklappe'},
  {question:'Das suchen alle Piraten',answer:'Schatz'},
]};

/* ── Confetti ── */
function Confetti(){
  const colors=['#e07a3a','#c46a30','#2E7D32','#FFD700','#E74C3C','#3498DB'];
  return <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,pointerEvents:'none',zIndex:999}}>
    {Array.from({length:50},(_,i)=>{
      const c=colors[i%colors.length];
      const tx=(Math.random()-0.5)*window.innerWidth+'px';
      const ty=-(Math.random()*600+200)+'px';
      const rot=(Math.random()*720-360)+'deg';
      const d=Math.random()*2+1;
      const left=Math.random()*100+'%';
      return <div key={i} style={{position:'absolute',bottom:0,left,width:10,height:10,borderRadius:Math.random()>0.5?'50%':'2px',background:c,animation:`confetti ${d}s ease-out forwards`,animationDelay:Math.random()*0.5+'s','--tx':tx,'--ty':ty,'--rot':rot}}/>;
    })}
  </div>;
}

/* ── Grid ── */
function Grid({gridData,mode,cellSize,playerInput,onInput}){
  const sz=cellSize||32;
  const inputRefs=useRef({});

  const handleKey=(rowIdx,letterIdx,e)=>{
    const key=e.key.toUpperCase();
    if(key==='BACKSPACE'){
      onInput(rowIdx,letterIdx,'');
      const prev=findPrev(gridData,rowIdx,letterIdx);
      if(prev)inputRefs.current[prev]?.focus();
      return;
    }
    if(key==='TAB')return;
    if(!/^[A-ZÄÖÜß]$/i.test(key)){e.preventDefault();return;}
    e.preventDefault();
    onInput(rowIdx,letterIdx,key);
    const next=findNext(gridData,rowIdx,letterIdx);
    if(next)inputRefs.current[next]?.focus();
  };

  function findNext(gd,row,li){
    if(li+1<gd.gridRows[row].answerLength)return`${row}-${li+1}`;
    if(row+1<gd.gridRows.length)return`${row+1}-0`;
    return null;
  }
  function findPrev(gd,row,li){
    if(li>0)return`${row}-${li-1}`;
    if(row>0)return`${row-1}-${gd.gridRows[row-1].answerLength-1}`;
    return null;
  }

  return <div style={{overflowX:'auto',display:'flex',justifyContent:'center',padding:'8px 0',WebkitOverflowScrolling:'touch'}}>
    <table style={{borderCollapse:'collapse'}}>
      <tbody>{gridData.gridRows.map((gr,rowIdx)=>
        <tr key={rowIdx}>{Array.from({length:gridData.totalCols},(_,colIdx)=>{
          const li=colIdx-gr.startCol;
          const inWord=li>=0&&li<gr.answerLength;
          const isSol=colIdx===gridData.solutionCol;
          if(!inWord)return <td key={colIdx} style={{width:sz,height:sz,minWidth:sz,border:'none'}}/>;

          const cellStyle={
            width:sz,height:sz,minWidth:sz,textAlign:'center',fontWeight:700,
            fontSize:sz>30?15:12,fontFamily:'var(--fd)',textTransform:'uppercase',
            border:`2px solid ${isSol?'var(--ad)':'var(--d)'}`,
            background:isSol?'var(--al)':'#fff',color:isSol?'var(--ad)':'var(--d)',
            position:'relative',padding:0,
          };

          if(mode==='play'){
            const val=playerInput?.[`${rowIdx}-${li}`]||'';
            const correct=val===gr.letters[li];
            return <td key={colIdx} style={cellStyle}>
              {li===0&&<span style={{position:'absolute',top:1,left:2,fontSize:8,fontWeight:600,color:'#999',fontFamily:'var(--f)',zIndex:1}}>{rowIdx+1}</span>}
              <input
                ref={el=>inputRefs.current[`${rowIdx}-${li}`]=el}
                value={val}
                onKeyDown={e=>handleKey(rowIdx,li,e)}
                onChange={()=>{}}
                maxLength={1}
                style={{
                  width:'100%',height:'100%',border:'none',outline:'none',textAlign:'center',
                  fontWeight:700,fontSize:sz>30?15:12,fontFamily:'var(--fd)',textTransform:'uppercase',
                  background:val?(correct?'#e8f5e9':'#fff'):'transparent',
                  color:isSol?'var(--ad)':'var(--d)',padding:0,caretColor:'var(--a)',
                }}
                autoComplete="off" inputMode="text"
              />
            </td>;
          }

          return <td key={colIdx} style={cellStyle} className={isSol?'grid-sol':''}>
            {li===0&&<span style={{position:'absolute',top:1,left:2,fontSize:8,fontWeight:600,color:'#999',fontFamily:'var(--f)'}}>{rowIdx+1}</span>}
            {mode==='solution'?gr.letters[li]:''}
          </td>;
        })}</tr>
      )}</tbody>
    </table>
  </div>;
}

/* ── App ── */
function App(){
  const[solution,setSolution]=useState('');
  const[rows,setRows]=useState([]);
  const[showGrid,setShowGrid]=useState(false);
  const[view,setView]=useState('editor');
  const[playerInput,setPlayerInput]=useState({});
  const[won,setWon]=useState(false);

  const handleSolutionChange=useCallback(val=>{
    const clean=val.replace(/[^a-zA-ZäöüÄÖÜß]/g,'').toUpperCase();
    setSolution(clean);setShowGrid(false);setView('editor');setWon(false);
    setRows(prev=>clean.split('').map((letter,i)=>({
      letter,question:prev[i]?.letter===letter?prev[i].question:'',answer:prev[i]?.letter===letter?prev[i].answer:'',
    })));
  },[]);

  const updateRow=useCallback((idx,field,val)=>{
    setRows(prev=>prev.map((r,i)=>i===idx?{...r,[field]:val}:r));
    setShowGrid(false);
  },[]);

  const loadExample=useCallback(()=>{
    setSolution(BEISPIEL.solution);
    setRows(BEISPIEL.solution.split('').map((l,i)=>({letter:l,question:BEISPIEL.rows[i].question,answer:BEISPIEL.rows[i].answer})));
    setShowGrid(true);
  },[]);

  const vResults=useMemo(()=>rows.map(r=>{
    if(!r.answer.trim())return{valid:false,error:null,pos:-1};
    const pos=bestPosition(r.answer,r.letter);
    if(pos===-1)return{valid:false,error:`Antwort muss \u201E${r.letter}\u201C enthalten`,pos:-1};
    return{valid:true,error:null,pos};
  }),[rows]);

  const allValid=rows.length>0&&vResults.every(v=>v.valid);

  const gridData=useMemo(()=>{
    if(!allValid)return null;
    const positions=vResults.map(v=>v.pos);
    const solCol=Math.max(...positions);
    const gRows=rows.map((r,i)=>{
      const n=toUpper(r.answer);
      return{letters:n.split(''),startCol:solCol-positions[i],answerLength:n.length};
    });
    const totalCols=Math.max(...gRows.map(g=>g.startCol+g.answerLength));
    return{gridRows:gRows,solutionCol:solCol,totalCols};
  },[allValid,rows,vResults]);

  const cellSize=gridData&&gridData.totalCols>12?24:gridData&&gridData.totalCols>9?28:34;

  useEffect(()=>{
    if(view!=='play'||!gridData||won)return;
    let correct=true;
    gridData.gridRows.forEach((gr,ri)=>{
      gr.letters.forEach((l,li)=>{
        if((playerInput[`${ri}-${li}`]||'')!==l)correct=false;
      });
    });
    if(correct)setWon(true);
  },[playerInput,view,gridData,won]);

  const handlePlayerInput=(ri,li,val)=>{
    setPlayerInput(prev=>({...prev,[`${ri}-${li}`]:val.toUpperCase()}));
  };

  const startPlay=()=>{setView('play');setPlayerInput({});setWon(false);};

  const btnP={padding:'12px 20px',borderRadius:'var(--rs)',fontWeight:700,fontSize:14,cursor:'pointer',border:'none',background:'var(--a)',color:'#fff',fontFamily:'var(--f)'};
  const btnS={padding:'12px 20px',borderRadius:'var(--rs)',fontWeight:700,fontSize:14,cursor:'pointer',border:'2px solid var(--l)',background:'var(--bg)',color:'var(--d)',fontFamily:'var(--f)'};

  /* ── Druck / Spiel Ansichten ── */
  if((view==='empty'||view==='solution'||view==='play')&&gridData){
    return <div style={{maxWidth:560,margin:'0 auto',padding:'32px 16px',background:view==='play'?'var(--w)':'#fff',minHeight:'100vh'}}>
      {won&&<Confetti/>}
      <div style={{textAlign:'center',marginBottom:20}}>
        <div style={{fontFamily:'var(--fd)',fontSize:24,fontWeight:800,marginBottom:4}}>
          {view==='play'?(won?'🎉 Geschafft!':'Kreuzworträtsel'):view==='solution'?'🔑 Lösungsblatt':'Kreuzworträtsel'}
        </div>
        <div style={{fontSize:14,color:'var(--m)'}}>
          {view==='play'?(won?<span>Das Lösungswort ist <strong style={{color:'var(--ad)'}}>{solution}</strong>!</span>:'Tippe die Antworten in die Kästchen!')
            :view==='solution'?<span>Lösungswort: <strong style={{color:'var(--ad)'}}>{solution}</strong></span>
            :'Finde das Lösungswort! Lies die markierten Felder von oben nach unten.'}
        </div>
      </div>

      <Grid gridData={gridData} mode={view==='play'?'play':view==='solution'?'solution':'empty'} cellSize={cellSize} playerInput={playerInput} onInput={handlePlayerInput}/>

      {view==='empty'&&<div style={{textAlign:'center',marginTop:10,fontSize:14,color:'var(--m)',letterSpacing:4}}>
        Lösungswort: {solution.split('').map(()=>'\u25A2').join(' ')} <span style={{letterSpacing:0,fontSize:12}}>({solution.length} Buchstaben)</span>
      </div>}

      {view==='play'&&!won&&<div style={{textAlign:'center',marginTop:10,fontSize:13,color:'var(--m)'}}>
        Lösungswort: {solution.split('').map((_,i)=>{
          const solCol=gridData.solutionCol;
          const li=solCol-gridData.gridRows[i].startCol;
          const val=playerInput[`${i}-${li}`]||'';
          const correct=val===gridData.gridRows[i].letters[li];
          return <span key={i} style={{display:'inline-block',width:24,height:24,lineHeight:'24px',margin:'0 2px',border:'2px solid '+(correct?'#2E7D32':'var(--l)'),borderRadius:6,fontWeight:700,fontSize:14,fontFamily:'var(--fd)',color:correct?'#2E7D32':'var(--d)',background:correct?'#e8f5e9':'#fff',textTransform:'uppercase'}}>{correct?val:''}</span>;
        })}
      </div>}

      {won&&<div style={{textAlign:'center',marginTop:16,animation:'popIn .4s ease-out'}}>
        <div style={{display:'inline-block',background:'#2E7D32',color:'#fff',padding:'10px 24px',borderRadius:20,fontWeight:700,fontSize:16}}>🏆 Lösungswort: {solution}</div>
      </div>}

      <div style={{marginTop:24,background:'var(--bg)',borderRadius:'var(--r)',padding:16,border:'1px solid var(--l)'}}>
        <div style={{fontFamily:'var(--fd)',fontSize:15,fontWeight:700,marginBottom:10,color:'var(--a)'}}>Fragen</div>
        {rows.map((r,i)=><div key={i} style={{fontSize:14,marginBottom:7,lineHeight:1.5}}>
          <strong style={{color:'var(--a)'}}>{i+1}.</strong> {r.question}
          {view==='solution'&&<span style={{color:'#2E7D32',fontWeight:600}}> → {toUpper(r.answer)}</span>}
        </div>)}
      </div>

      <div className="no-print" style={{display:'flex',gap:8,justifyContent:'center',marginTop:20,flexWrap:'wrap'}}>
        <button onClick={()=>{setView('editor');setWon(false);}} style={btnS}>← Zurück</button>
        {view!=='play'&&<button onClick={()=>window.print()} style={btnP}>🖨 Drucken</button>}
        {view==='empty'&&<><button onClick={()=>setView('solution')} style={btnS}>🔑 Lösung</button><button onClick={startPlay} style={{...btnP,background:'#2E7D32'}}>🎮 Spielen</button></>}
        {view==='solution'&&<><button onClick={()=>setView('empty')} style={btnS}>📄 Leer</button><button onClick={startPlay} style={{...btnP,background:'#2E7D32'}}>🎮 Spielen</button></>}
        {view==='play'&&<><button onClick={()=>setView('empty')} style={btnS}>📄 Drucken</button>{won&&<button onClick={startPlay} style={btnP}>↺ Nochmal</button>}</>}
      </div>

      <div style={{textAlign:'center',marginTop:12,fontSize:10,color:'#ccc'}}>machsleicht.de</div>
    </div>;
  }

  /* ── Editor ── */
  return <div style={{maxWidth:720,margin:'0 auto',padding:'24px 16px 80px'}}>
    <div className="no-print" style={{textAlign:'center',marginBottom:24}}>
      <a href="/" style={{fontFamily:'var(--fd)',fontSize:18,color:'var(--d)',textDecoration:'none'}}>machs<span style={{color:'var(--a)'}}>leicht</span></a>
    </div>

    <h1 className="no-print" style={{fontFamily:'var(--fd)',fontSize:'clamp(24px,5vw,32px)',fontWeight:800,textAlign:'center',marginBottom:8,lineHeight:1.2}}>Kreuzworträtsel erstellen</h1>
    <p className="no-print" style={{textAlign:'center',color:'var(--m)',fontSize:15,marginBottom:32,lineHeight:1.5}}>
      Personalisiertes Kreuzworträtsel mit Lösungswort.<br/>Perfekt für Schatzsuchen, Geburtstage oder den Unterricht.
    </p>

    <div className="no-print" style={{marginBottom:24}}>
      <label style={{fontSize:13,fontWeight:600,color:'var(--a)',marginBottom:6,display:'block'}}>Lösungswort</label>
      <input
        style={{width:'100%',padding:'12px 14px',border:'2px solid var(--l)',borderRadius:'var(--rs)',fontFamily:'var(--fd)',fontSize:22,fontWeight:700,textAlign:'center',letterSpacing:6,textTransform:'uppercase',background:'var(--bg)',color:'var(--d)',outline:'none',transition:'border-color .2s'}}
        type="text" placeholder="z.B. PIRAT" value={solution}
        onChange={e=>handleSolutionChange(e.target.value)} maxLength={14} autoComplete="off"
        onFocus={e=>e.target.style.borderColor='var(--a)'}
        onBlur={e=>e.target.style.borderColor='var(--l)'}
      />
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:4}}>
        <span style={{fontSize:12,color:'var(--m)'}}>{solution.length>0?`${solution.length} Buchstaben`:'Das Wort das die Kinder herausfinden'}</span>
        <button onClick={loadExample} style={{fontSize:13,color:'var(--a)',cursor:'pointer',background:'none',border:'none',fontWeight:600,textDecoration:'underline',fontFamily:'var(--f)'}}>Beispiel laden</button>
      </div>
    </div>

    {rows.length>0&&<div className="no-print">
      <div style={{fontSize:13,fontWeight:600,color:'var(--a)',marginBottom:12}}>Fragen & Antworten</div>
      {rows.map((r,i)=>{
        const v=vResults[i];
        const bc=v.error?'#e74c3c':v.valid?'#2E7D32':'var(--l)';
        return <div key={i} style={{marginBottom:12,background:'var(--bg)',border:`1px solid ${bc}`,borderRadius:'var(--r)',padding:14,transition:'border-color .2s'}}>
          <div style={{display:'flex',alignItems:'center',marginBottom:10,gap:6,flexWrap:'wrap'}}>
            <span style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:26,height:26,borderRadius:8,background:'var(--a)',color:'#fff',fontWeight:700,fontSize:13,flexShrink:0}}>{i+1}</span>
            <span style={{fontSize:13,color:'var(--m)'}}>Antwort muss</span>
            <span style={{fontFamily:'var(--fd)',fontWeight:800,fontSize:18,color:'var(--a)'}}>{r.letter}</span>
            <span style={{fontSize:13,color:'var(--m)'}}>enthalten</span>
          </div>
          <div className="row-fields">
            <input style={{width:'100%',padding:'10px 12px',border:'2px solid var(--l)',borderRadius:10,fontSize:14,background:'#fff',outline:'none',fontFamily:'var(--f)',transition:'border-color .2s'}}
              placeholder={`Frage ${i+1}`} value={r.question} onChange={e=>updateRow(i,'question',e.target.value)}
              onFocus={e=>e.target.style.borderColor='var(--a)'} onBlur={e=>e.target.style.borderColor='var(--l)'}/>
            <input style={{width:'100%',padding:'10px 12px',border:`2px solid ${bc}`,borderRadius:10,fontSize:14,background:'#fff',outline:'none',fontFamily:'var(--f)',transition:'border-color .2s'}}
              placeholder={`Antwort mit \u201E${r.letter}\u201C`} value={r.answer} onChange={e=>updateRow(i,'answer',e.target.value)}/>
          </div>
          {v.error&&<div style={{fontSize:12,color:'#e74c3c',marginTop:5,fontWeight:500}}>{v.error}</div>}
          {v.valid&&r.answer&&<div style={{fontSize:12,color:'#2E7D32',marginTop:5,fontWeight:500}}>✓ \u201E{r.letter}\u201C in \u201E{toUpper(r.answer)}\u201C</div>}
        </div>;
      })}
    </div>}

    {rows.length>0&&<div className="no-print" style={{display:'flex',gap:10,justifyContent:'center',marginTop:24,flexWrap:'wrap'}}>
      <button onClick={()=>setShowGrid(true)} disabled={!allValid}
        style={{...btnP,opacity:allValid?1:0.4,cursor:allValid?'pointer':'not-allowed',background:allValid?'var(--a)':'#ddd'}}>
        Rätsel erstellen
      </button>
      <button onClick={()=>{setSolution('');setRows([]);setShowGrid(false);}} style={btnS}>Zurücksetzen</button>
    </div>}

    {showGrid&&gridData&&<div style={{marginTop:40}}>
      <h2 style={{fontFamily:'var(--fd)',fontSize:20,fontWeight:700,textAlign:'center',marginBottom:4}}>Vorschau</h2>
      <p style={{textAlign:'center',fontSize:13,color:'var(--m)',marginBottom:16}}>Lösungswort: <strong style={{color:'var(--ad)'}}>{solution}</strong></p>
      <Grid gridData={gridData} mode="solution" cellSize={cellSize} playerInput={{}} onInput={()=>{}}/>

      <div style={{marginTop:20,background:'var(--bg)',borderRadius:'var(--r)',padding:16}}>
        <h3 style={{fontFamily:'var(--fd)',fontSize:15,marginBottom:10,color:'var(--a)'}}>Fragen</h3>
        {rows.map((r,i)=><div key={i} style={{fontSize:14,marginBottom:6,lineHeight:1.5}}>
          <span style={{fontWeight:700,color:'var(--a)'}}>{i+1}.</span> {r.question}
        </div>)}
      </div>

      <div className="no-print" style={{display:'flex',gap:10,justifyContent:'center',marginTop:24,flexWrap:'wrap'}}>
        <button onClick={()=>setView('empty')} style={{...btnP,display:'flex',alignItems:'center',gap:6}}>📄 Drucken</button>
        <button onClick={()=>setView('solution')} style={{...btnS,display:'flex',alignItems:'center',gap:6}}>🔑 Lösung</button>
        <button onClick={startPlay} style={{...btnP,display:'flex',alignItems:'center',gap:6,background:'#2E7D32'}}>🎮 Spielen</button>
      </div>
      <p className="no-print" style={{textAlign:'center',fontSize:12,color:'#999',marginTop:8}}>📄 Leere Kästchen · 🔑 Kontrollblatt · 🎮 Am Handy spielen</p>

      <div className="no-print" style={{textAlign:'center',marginTop:32,padding:20,background:'var(--al)',borderRadius:'var(--r)'}}>
