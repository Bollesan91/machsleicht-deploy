<script>
document.querySelectorAll('.copy-btn').forEach(function(btn){
  btn.addEventListener('click', function(){
    var block=btn.closest('.copy-block');var text=(block.querySelector('.copy-text')||block).textContent.trim();
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(function(){btn.textContent='✓ Kopiert';setTimeout(function(){btn.textContent='Kopieren'},2000)}).catch(function(){fallbackCopy(text,btn)});
    }else{fallbackCopy(text,btn)}
  });
});
function fallbackCopy(text,btn){var ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy');btn.textContent='✓ Kopiert'}catch(e){btn.textContent='Fehler'}document.body.removeChild(ta);setTimeout(function(){btn.textContent='Kopieren'},2000)}
</script>
