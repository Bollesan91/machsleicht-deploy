<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Piraten-Einladung Prototyp</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'DM Sans', system-ui, sans-serif;
  }
</style>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useCallback, useRef, useEffect} = React;

const ITEMS = [
  { id:"fass",    cover:"🛢️", hidden:"coin",     x:18, y:48, label:"Altes Fass" },
  { id:"muschel", cover:"🐚", hidden:"coin",     x:72, y:56, label:"Muschel" },
  { id:"holz",    cover:"🪵", hidden:"treasure", x:48, y:64, label:"Treibholz" },
  { id:"stein",   cover:"🪨", hidden:"empty",    x:82, y:42, label:"Felsen" },
  { id:"koralle", cover:"🪸", hidden:"empty",    x:28, y:74, label:"Koralle" },
  { id:"krabbe",  cover:"🦀", hidden:"empty",    x:62, y:80, label:"Krabbe" },
  { id:"anker",   cover:"⚓", hidden:"empty",    x:10, y:65, label:"Anker" },
  { id:"seetang", cover:"🌿", hidden:"empty",    x:88, y:70, label:"Seetang" },
  { id:"kompass", cover:"🧭", hidden:"empty",    x:45, y:88, label:"Kompass" },
];

function PiratenInsel({
  childName = "Mattis",
  partyDate = "Samstag, 15. Mai 2026",
  partyTime = "14:00 – 17:00 Uhr",
  partyPlace = "Volkspark Friedrichshain",
}) {
  const [revealed, setRevealed] = useState(new Set());
  const [found, setFound] = useState([]);
  const [phase, setPhase] = useState("intro");
  const [effects, setEffects] = useState([]);
  const [wobbleId, setWobbleId] = useState(null);
  const sceneRef = useRef(null);
  const WATER_END = 32;
  const [muted, setMuted] = useState(true);
  const audioCtxRef = useRef(null);
  const gainRef = useRef(null);
  const musicStartedRef = useRef(false);
  const loopTimerRef = useRef(null);

  const startMusic = useCallback(() => {
    if (musicStartedRef.current) return;
    musicStartedRef.current = true;
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    audioCtxRef.current = ctx;
    const gain = ctx.createGain();
    gain.gain.value = 0;
    gain.connect(ctx.destination);
    gainRef.current = gain;
    const notes = [392,392,440,494,494,440,392,330,294,294,330,392,392,349,349,294,294,330,392,349,330,294,262,392,392,440,494,494,440,392,330];
    const durations = [.3,.3,.3,.6,.3,.3,.3,.6,.3,.3,.3,.45,.15,.6,.6,.3,.3,.3,.45,.15,.3,.3,.6,.3,.3,.3,.6,.3,.3,.3,.6];
    const playLoop = () => {
      if (!audioCtxRef.current) return;
      let t = ctx.currentTime + 0.1;
      notes.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const noteGain = ctx.createGain();
        osc.type = "triangle";
        osc.frequency.value = freq;
        noteGain.gain.setValueAtTime(0.12, t);
        noteGain.gain.exponentialRampToValueAtTime(0.01, t + durations[i] * 0.9);
        osc.connect(noteGain);
        noteGain.connect(gain);
        osc.start(t);
        osc.stop(t + durations[i]);
        t += durations[i];
      });
      const bass = ctx.createOscillator();
      const bassGain = ctx.createGain();
      bass.type = "sine";
      bass.frequency.value = 130.81;
      bassGain.gain.value = 0.06;
      bass.connect(bassGain);
      bassGain.connect(gain);
      const loopDur = durations.reduce((a,b)=>a+b,0);
      bass.start(ctx.currentTime + 0.1);
      bass.stop(ctx.currentTime + 0.1 + loopDur);
      loopTimerRef.current = setTimeout(playLoop, loopDur * 1000);
    };
    playLoop();
  }, []);

  useEffect(() => {
    if (gainRef.current) {
      gainRef.current.gain.linearRampToValueAtTime(muted ? 0 : 1, (audioCtxRef.current?.currentTime || 0) + 0.1);
    }
  }, [muted]);

  useEffect(() => {
    return () => {
      if (loopTimerRef.current) clearTimeout(loopTimerRef.current);
      if (audioCtxRef.current) { audioCtxRef.current.close(); audioCtxRef.current = null; musicStartedRef.current = false; }
    };
  }, []);

  const toggleMute = () => { if (!musicStartedRef.current) startMusic(); setMuted(m => !m); };

  const addFx = useCallback((type, x, y, emoji) => {
    const id = Date.now() + Math.random();
    setEffects(p => [...p, { id, type, x, y, emoji }]);
    setTimeout(() => setEffects(p => p.filter(e => e.id !== id)), 1200);
  }, []);

  const tap = useCallback((item, e) => {
    if (phase !== "play" || revealed.has(item.id)) return;
    e.preventDefault();
    const r = sceneRef.current?.getBoundingClientRect();
    if (!r) return;
    const px = (e.clientX || e.touches?.[0]?.clientX || 0) - r.left;
    const py = (e.clientY || e.touches?.[0]?.clientY || 0) - r.top;
    const next = new Set([...revealed, item.id]);
    setRevealed(next);
    if (item.hidden === "coin") {
      setFound(p => [...p, "coin"]);
      addFx("coin", px, py, "🪙");
    } else if (item.hidden === "treasure") {
      setFound(p => [...p, "treasure"]);
      addFx("chest", px, py, "💰");
    } else {
      setWobbleId(item.id);
      addFx("miss", px, py, "💨");
      setTimeout(() => setWobbleId(null), 500);
    }
    const totalFound = found.length + (item.hidden !== "empty" ? 1 : 0);
    if (totalFound === 3) { setTimeout(() => setPhase("won"), 1000); }
  }, [phase, revealed, found, addFx]);

  const restart = () => { setRevealed(new Set()); setFound([]); setEffects([]); setWobbleId(null); setPhase("intro"); };

  const dots = ["coin","coin","treasure"].map((t,i) => {
    const done = i < found.length;
    return (
      <div key={i} style={{
        width:34, height:34, borderRadius:"50%",
        background: done ? "rgba(255,215,0,.95)" : "rgba(255,255,255,.13)",
        display:"flex", alignItems:"center", justifyContent:"center",
        fontSize: done ? 18 : 13, transition:"all .4s cubic-bezier(.34,1.56,.64,1)",
        transform: done ? "scale(1.2)" : "scale(1)",
        boxShadow: done ? "0 0 14px rgba(255,215,0,.5)" : "none",
      }}>
        {done ? (t === "treasure" ? "💰" : "🪙") : <span style={{color:"rgba(255,255,255,.3)"}}>?</span>}
      </div>
    );
  });

  const css = `
    @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    @keyframes sway{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
    @keyframes drift{0%{transform:translateX(0)}100%{transform:translateX(30px)}}
    @keyframes sail{0%{transform:translateX(-20px)}50%{transform:translateX(20px)}100%{transform:translateX(-20px)}}
    @keyframes wave{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
    @keyframes floatUp{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-70px) scale(1.5);opacity:0}}
    @keyframes sparkBurst{0%{transform:translate(-50%,-50%) scale(.3);opacity:1}100%{transform:translate(-50%,-50%) scale(2.5);opacity:0}}
    @keyframes ripple{0%{transform:translate(-50%,-50%) scale(.3);opacity:.8}100%{transform:translate(-50%,-50%) scale(2.5);opacity:0}}
    @keyframes wobble{0%,100%{transform:translate(-50%,-50%) rotate(0)}25%{transform:translate(-50%,-50%) rotate(-10deg) scale(1.12)}75%{transform:translate(-50%,-50%) rotate(10deg) scale(1.12)}}
    @keyframes gentle{0%,100%{transform:translate(-50%,-50%) translateY(0)}50%{transform:translate(-50%,-50%) translateY(-3px)}}
    @keyframes gull{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,-8px)}}
    @keyframes confetti{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(800deg);opacity:0}}
    @keyframes bounceIn{0%{transform:scale(0);opacity:0}60%{transform:scale(1.25)}100%{transform:scale(1);opacity:1}}
  `;

  const Island = ({ children, overlay }) => (
    <div ref={sceneRef} style={{
      position:"relative", width:"100%", maxWidth:420, margin:"0 auto",
      aspectRatio:"9/16", maxHeight:"85vh", borderRadius:20, overflow:"hidden",
      background:`linear-gradient(180deg, #87CEEB 0%, #5BA3D9 18%, #3A8FB7 ${WATER_END-2}%, #2980A8 ${WATER_END}%, #D4BE8A ${WATER_END+1}%, #E0CFA0 ${WATER_END+10}%, #D4BE8A 60%, #C2A86B 80%, #B09858 100%)`,
      touchAction:"manipulation", userSelect:"none",
      boxShadow:"0 8px 40px rgba(0,0,0,.25)",
      fontFamily:"'DM Sans',system-ui,sans-serif",
    }}>
      <div style={{position:"absolute",right:"15%",top:"5%",width:48,height:48,borderRadius:"50%",
        background:"radial-gradient(circle,#FFFDE7,#FFD54F,#FFA000)",
        boxShadow:"0 0 50px rgba(255,200,0,.3)",zIndex:2}} />
      <div style={{position:"absolute",left:"6%",top:"7%",fontSize:28,opacity:.55,
        animation:"drift 20s ease-in-out infinite",zIndex:2}}>☁️</div>
      <div style={{position:"absolute",left:"50%",top:"3%",fontSize:20,opacity:.35,
        animation:"drift 26s ease-in-out infinite reverse",zIndex:2}}>☁️</div>
      <div style={{position:"absolute",left:"78%",top:"10%",fontSize:16,opacity:.3,
        animation:"drift 22s ease-in-out infinite",animationDelay:"-8s",zIndex:2}}>☁️</div>
      <div style={{position:"absolute",left:"22%",top:"8%",fontSize:13,opacity:.3,
        animation:"gull 10s ease-in-out infinite",zIndex:3}}>🕊️</div>
      <div style={{position:"absolute",left:"65%",top:"12%",fontSize:11,opacity:.22,
        animation:"gull 13s ease-in-out infinite reverse",zIndex:3}}>🕊️</div>
      <div style={{
        position:"absolute", left:"60%", top:"16%", zIndex:6,
        animation:"sail 10s ease-in-out infinite",
        filter:"drop-shadow(0 3px 8px rgba(0,0,0,.2))",
      }}>
        <div style={{fontSize:20,position:"absolute",top:-14,left:8}}>🏴‍☠️</div>
        <div style={{fontSize:32}}>⛵</div>
      </div>
      <div style={{position:"absolute",left:0,right:0,top:`${WATER_END-1}%`,height:5,
        zIndex:7,overflow:"hidden",opacity:.3}}>
        <div style={{width:"200%",height:"100%",
          background:"repeating-linear-gradient(90deg,transparent,transparent 22px,rgba(255,255,255,.4) 22px,rgba(255,255,255,.4) 24px)",
          animation:"wave 2.5s linear infinite"}} />
      </div>
      <div style={{position:"absolute",left:0,right:0,top:`${WATER_END}%`,height:3,
        zIndex:7,overflow:"hidden",opacity:.2}}>
        <div style={{width:"200%",height:"100%",
          background:"repeating-linear-gradient(90deg,transparent,transparent 18px,rgba(255,255,255,.35) 18px,rgba(255,255,255,.35) 20px)",
          animation:"wave 3.8s linear infinite reverse"}} />
      </div>
      <div style={{
        position:"absolute", left:"22%", top:`${WATER_END+2}%`, zIndex:15,
        transformOrigin:"bottom center", animation:"sway 5s ease-in-out infinite",
        pointerEvents:"none",
      }}>
        <div style={{fontSize:56,transform:"translateX(-50%)"}}>🌴</div>
      </div>
      <div style={{
        position:"absolute", right:"8%", top:`${WATER_END+6}%`, zIndex:15,
        transformOrigin:"bottom center", animation:"sway 6.5s ease-in-out infinite",
        animationDelay:"-2s", pointerEvents:"none",
      }}>
        <div style={{fontSize:34,opacity:.7}}>🌴</div>
      </div>
      <div style={{position:"absolute",left:"18%",top:`${WATER_END+13}%`,fontSize:12,opacity:.4,zIndex:14,pointerEvents:"none"}}>🥥</div>
      <div style={{position:"absolute",left:"26%",top:`${WATER_END+14}%`,fontSize:10,opacity:.3,zIndex:14,pointerEvents:"none"}}>🥥</div>
      <div style={{position:"absolute",left:"55%",top:"93%",fontSize:10,opacity:.15,zIndex:6,pointerEvents:"none"}}>🐾</div>
      <div style={{position:"absolute",left:"12%",top:"96%",fontSize:8,opacity:.1,zIndex:6,pointerEvents:"none"}}>🐾</div>
      <div style={{position:"absolute",left:"92%",top:`${WATER_END+4}%`,fontSize:9,opacity:.18,zIndex:6,pointerEvents:"none"}}>🐚</div>
      {overlay && <div style={{position:"absolute",inset:0,background:overlay,zIndex:40,pointerEvents:"none"}} />}
      <button onClick={toggleMute} style={{
        position:"absolute",top:12,right:12,zIndex:250,
        width:36,height:36,borderRadius:"50%",border:"none",
        background:"rgba(0,0,0,.3)",backdropFilter:"blur(8px)",
        color:"#fff",fontSize:16,cursor:"pointer",
        display:"flex",alignItems:"center",justifyContent:"center",
        WebkitTapHighlightColor:"transparent",
      }}>{muted ? "🔇" : "🔊"}</button>
      {children}
    </div>
  );

  if (phase === "intro") {
    return (
      <><style>{css}</style>
      <Island overlay="linear-gradient(180deg, rgba(0,0,0,.05) 0%, rgba(0,0,0,.6) 100%)">
        <div style={{
          position:"absolute",inset:0,zIndex:50,
          display:"flex",flexDirection:"column",alignItems:"center",
          justifyContent:"flex-end",padding:"0 24px 36px",textAlign:"center",
        }}>
          <p style={{color:"rgba(255,255,255,.7)",fontSize:12,fontWeight:600,margin:"0 0 6px",
            letterSpacing:1,textTransform:"uppercase",
            textShadow:"0 1px 4px rgba(0,0,0,.4)"}}>Einladung zu</p>
          <p style={{color:"#fff",fontSize:18,fontWeight:800,margin:"0 0 14px",
            textShadow:"0 2px 8px rgba(0,0,0,.5)"}}>
            Die Piratenschatzsuche von {childName}</p>
          <div style={{fontSize:56,marginBottom:10,animation:"bob 2.5s ease-in-out infinite"}}>🏴‍☠️</div>
          <h1 style={{color:"#FFD700",fontSize:22,fontWeight:900,margin:"0 0 6px",
            textShadow:"0 2px 10px rgba(0,0,0,.5)"}}>Käpt'n Rotbarts Insel</h1>
          <p style={{color:"#f5e6c8",fontSize:14,margin:"0 0 6px",lineHeight:1.6,maxWidth:280,
            textShadow:"0 1px 6px rgba(0,0,0,.4)"}}>
            Hilf <strong>{childName}</strong> die 3 Schätze zu finden!</p>
          <div style={{display:"flex",gap:18,margin:"14px 0 24px"}}>
            {[{e:"🪙",l:"Münze"},{e:"🪙",l:"Münze"},{e:"💰",l:"Schatztruhe!"}].map((t,i)=>(
              <div key={i} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                <div style={{
                  width:48,height:48,borderRadius:"50%",
                  background:"rgba(255,215,0,.12)",border:"2px solid rgba(255,215,0,.25)",
                  display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,
                }}>{t.e}</div>
                <span style={{color:"#e0c97f",fontSize:11,fontWeight:600}}>{t.l}</span>
              </div>
            ))}
          </div>
          <button onClick={()=>setPhase("play")} style={{
            padding:"16px 44px",background:"linear-gradient(135deg,#FFD700,#E8873D)",
            color:"#1a1a2e",border:"none",borderRadius:99,fontSize:17,fontWeight:800,
            cursor:"pointer",boxShadow:"0 6px 28px rgba(255,215,0,.35)",
            WebkitTapHighlightColor:"transparent",
          }}>🗺️ Los geht's!</button>
        </div>
      </Island></>
    );
  }

  if (phase === "won") {
    const conf = Array.from({length:50},(_,i)=>({
      id:i,left:Math.random()*100,delay:Math.random()*.5,dur:1.5+Math.random()*2,
      color:["#FFD700","#E8873D","#D94F6B","#4CAF50","#2196F3","#FF5722","#FFF"][i%7],
      size:5+Math.random()*7,
    }));
    return (
      <><style>{css}</style>
      <Island overlay="linear-gradient(180deg, rgba(0,0,0,.08) 0%, rgba(0,40,0,.6) 100%)">
        <div style={{position:"absolute",inset:0,pointerEvents:"none",overflow:"hidden",zIndex:200}}>
          {conf.map(c=>(
            <div key={c.id} style={{
              position:"absolute",left:`${c.left}%`,top:-10,
              width:c.size,height:c.size*.6,borderRadius:2,background:c.color,
              animation:`confetti ${c.dur}s ease-in ${c.delay}s forwards`,
            }}/>
          ))}
        </div>
        <div style={{
          position:"absolute",inset:0,zIndex:100,
          display:"flex",flexDirection:"column",alignItems:"center",
          justifyContent:"center",padding:24,textAlign:"center",
        }}>
          <div style={{fontSize:68,marginBottom:10,animation:"bounceIn .6s cubic-bezier(.34,1.56,.64,1)"}}>💰</div>
          <h1 style={{color:"#FFD700",fontSize:24,fontWeight:900,margin:"0 0 4px",
            textShadow:"0 2px 10px rgba(0,0,0,.5)"}}>Schatz gefunden!</h1>
          <p style={{color:"#a8d5a2",fontSize:15,fontWeight:700,margin:"0 0 2px",
            textShadow:"0 1px 4px rgba(0,0,0,.4)"}}>Du bist ein echter Pirat! 🏴‍☠️</p>
          <p style={{color:"#e0e0e0",fontSize:14,margin:"0 0 24px",
            textShadow:"0 1px 4px rgba(0,0,0,.3)"}}>
            Bereit für <strong style={{color:"#FFD700"}}>den Piraten-Geburtstag von {childName}!</strong></p>
          <div style={{
            background:"rgba(0,0,0,.35)",backdropFilter:"blur(16px)",
            borderRadius:16,padding:"18px 22px",marginBottom:24,
            maxWidth:280,width:"100%",border:"1px solid rgba(255,215,0,.12)",
          }}>
            <p style={{color:"#FFD700",fontSize:12,fontWeight:700,margin:"0 0 10px",letterSpacing:.5}}>📋 PARTY-DETAILS</p>
            <div style={{display:"flex",flexDirection:"column",gap:7,textAlign:"left"}}>
              <span style={{color:"#eee",fontSize:14}}>📅 {partyDate}</span>
              <span style={{color:"#eee",fontSize:14}}>🕑 {partyTime}</span>
              <span style={{color:"#eee",fontSize:14}}>📍 {partyPlace}</span>
            </div>
          </div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={restart} style={{
              padding:"12px 22px",background:"rgba(255,255,255,.1)",
              color:"#ddd",border:"1px solid rgba(255,255,255,.2)",
              borderRadius:99,fontSize:14,fontWeight:600,cursor:"pointer",
              backdropFilter:"blur(8px)",WebkitTapHighlightColor:"transparent",
            }}>🔄 Nochmal</button>
            <button style={{
              padding:"12px 22px",background:"linear-gradient(135deg,#25D366,#128C7E)",
              color:"#fff",border:"none",borderRadius:99,fontSize:14,
              fontWeight:700,cursor:"pointer",WebkitTapHighlightColor:"transparent",
            }}>✅ Bin dabei!</button>
          </div>
          <p style={{color:"rgba(255,255,255,.2)",fontSize:10,marginTop:20}}>machsleicht.de</p>
        </div>
      </Island></>
    );
  }

  return (
    <><style>{css}</style>
    <Island>
      <div style={{
        position:"absolute",top:0,left:0,right:0,zIndex:60,
        padding:"12px 16px",
        background:"linear-gradient(180deg,rgba(0,0,0,.45) 0%,transparent 100%)",
        display:"flex",alignItems:"center",justifyContent:"space-between",
      }}>
        <span style={{color:"#FFD700",fontSize:13,fontWeight:700,
          textShadow:"0 1px 4px rgba(0,0,0,.5)"}}>🏴‍☠️ Finde den Schatz!</span>
        <div style={{display:"flex",gap:8}}>{dots}</div>
      </div>
      <div style={{
        position:"absolute",top:52,right:12,zIndex:60,
        background:"rgba(0,0,0,.3)",backdropFilter:"blur(8px)",
        borderRadius:99,padding:"4px 10px",
        color:"rgba(255,255,255,.6)",fontSize:11,fontWeight:600,
      }}>{found.length}/3 🪙</div>
      <div style={{
        position:"absolute",bottom:0,left:0,right:0,zIndex:60,
        padding:"12px 16px",
        background:"linear-gradient(0deg,rgba(0,0,0,.4) 0%,transparent 100%)",
        textAlign:"center",
      }}>
        <p style={{color:"rgba(255,255,255,.75)",fontSize:13,margin:0,fontWeight:500,
          textShadow:"0 1px 4px rgba(0,0,0,.5)"}}>
          {found.length === 0 && "👆 Tippe auf die Gegenstände am Strand!"}
          {found.length === 1 && "🪙 Eine Münze! Finde noch 2 Schätze!"}
          {found.length === 2 && "🔥 Noch einer! Wo ist die Truhe?"}
          {found.length >= 3 && "🎉 Alle Schätze gefunden!"}
        </p>
      </div>
      {ITEMS.map(item => {
        const done = revealed.has(item.id);
        const shaking = wobbleId === item.id;
        const isGold = item.hidden === "coin";
        const isChest = item.hidden === "treasure";
        const special = isGold || isChest;
        return (
          <div key={item.id}
            onPointerUp={e => tap(item, e)}
            style={{
              position:"absolute",
              left:`${item.x}%`, top:`${item.y}%`,
              transform:"translate(-50%,-50%)",
              zIndex: done ? 8 : 25,
              cursor: done ? "default" : "pointer",
              WebkitTapHighlightColor:"transparent",
              animation: shaking ? "wobble .45s ease"
                : !done ? `gentle 3.5s ease-in-out infinite ${item.x*25}ms`
                : "none",
            }}>
            {!done && <div style={{position:"absolute",inset:-16,borderRadius:"50%"}} />}
            {!done && <div style={{
              position:"absolute",bottom:-5,left:"50%",transform:"translateX(-50%)",
              width:34,height:8,borderRadius:"50%",
              background:"rgba(0,0,0,.1)",filter:"blur(3px)",
            }}/>}
            <div style={{
              fontSize: done ? 26 : 36,
              transition:"all .35s cubic-bezier(.34,1.56,.64,1)",
              filter: done && !special ? "grayscale(.7) brightness(.5)" : "none",
              opacity: done && !special ? .3 : 1,
              transform: done ? "scale(.6)" : "scale(1)",
            }}>
              {done ? (isGold ? "🪙" : isChest ? "💰" : "🕳️") : item.cover}
            </div>
            <div style={{
              position:"absolute",bottom:-18,left:"50%",transform:"translateX(-50%)",
              whiteSpace:"nowrap",fontSize:10,fontWeight:600,
              padding:"2px 7px",borderRadius:6,
              ...(done
                ? special
                  ? {color:"#FFD700",textShadow:"0 1px 3px rgba(0,0,0,.6)",background:"rgba(0,0,0,.2)"}
                  : {color:"rgba(255,255,255,.3)",textShadow:"0 1px 2px rgba(0,0,0,.3)"}
                : {color:"rgba(255,255,255,.75)",textShadow:"0 1px 3px rgba(0,0,0,.5)",
                   background:"rgba(0,0,0,.18)",backdropFilter:"blur(4px)"}
              ),
            }}>
              {done ? (isGold ? "Gold! ✨" : isChest ? "SCHATZ! 💰" : "Nichts versteckt!") : item.label}
            </div>
          </div>
        );
      })}
      {effects.map(fx => {
        if (fx.type === "coin" || fx.type === "chest") {
          return (
            <div key={fx.id}>
              <div style={{position:"absolute",left:fx.x-14,top:fx.y-14,fontSize:28,
                pointerEvents:"none",zIndex:150,animation:"floatUp 1s ease-out forwards"}}>{fx.emoji}</div>
              <div style={{position:"absolute",left:fx.x,top:fx.y,width:50,height:50,borderRadius:"50%",
                border:"3px solid rgba(255,215,0,.6)",transform:"translate(-50%,-50%)",
                pointerEvents:"none",zIndex:140,animation:"sparkBurst .6s ease-out forwards"}}/>
              {Array.from({length:8},(_,i)=>{const a=(i*45)*Math.PI/180;return(
                <div key={i} style={{position:"absolute",left:fx.x-3,top:fx.y-3,width:6,height:6,
                  borderRadius:"50%",background:"#FFD700",pointerEvents:"none",zIndex:145,
                  animation:`floatUp .7s ease-out ${i*.04}s forwards`,
                  transform:`translate(${Math.cos(a)*5}px,${Math.sin(a)*5}px)`}}/>
              );})}
            </div>
          );
        }
        if (fx.type === "miss") {
          return (
            <div key={fx.id}>
              <div style={{position:"absolute",left:fx.x-12,top:fx.y-12,fontSize:22,
                pointerEvents:"none",zIndex:150,animation:"floatUp .8s ease-out forwards",opacity:.5}}>{fx.emoji}</div>
              <div style={{position:"absolute",left:fx.x,top:fx.y,width:40,height:40,borderRadius:"50%",
                border:"2px solid rgba(194,178,128,.35)",transform:"translate(-50%,-50%)",
                pointerEvents:"none",zIndex:140,animation:"ripple .6s ease-out forwards"}}/>
            </div>
          );
        }
        return null;
      })}
    </Island></>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<PiratenInsel />);
</script>
</body>
</html>
