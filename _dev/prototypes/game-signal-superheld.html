<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Helden-Signal — Superheld</title>
<link rel="stylesheet" href="core/core.css?v=20260708">
<style>
  /* E11 Simon/Sequenz: Signal-Folge nachtippen -> entschlüsselt -> Foto-Slot-Reveal (Geheimidentität). Auf Shared Core. */
  :root{--bg1:#0c1226;--bg2:#24306b;--fg:#fff;--accent:#ffd166;--accent-dk:#c4961a;--ink:#1a1f33}
  .screen{width:100%;max-width:340px;aspect-ratio:1.5;border-radius:16px;background:radial-gradient(circle at 50% 30%,#16204a,#080c1c);box-shadow:0 12px 30px rgba(0,0,0,.5),inset 0 0 0 3px #3a4a8a;display:flex;align-items:center;justify-content:center;text-align:center;position:relative;overflow:hidden}
  .screen .msg{font-size:18px;font-weight:800;color:#9fc0ff;letter-spacing:1px;padding:0 16px;z-index:2}
  .screen .pic{position:absolute;inset:0;background-image:var(--photo);background-size:cover;background-position:center;opacity:0;filter:blur(16px) saturate(.55);transition:opacity .6s ease,filter .6s ease}
  .screen.reveal .pic{opacity:1}.screen.reveal .msg{color:#fff;text-shadow:0 2px 8px #000}
  .level{font-weight:800;font-size:14px}
  .pad-wrap{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:320px}
  .pad{aspect-ratio:1.3;border:0;border-radius:18px;font-size:34px;cursor:pointer;opacity:.55;transition:opacity .1s,transform .08s,box-shadow .1s;box-shadow:0 6px 0 rgba(0,0,0,.35);filter:saturate(1.1)}
  .pad:active{transform:translateY(3px);box-shadow:0 3px 0 rgba(0,0,0,.35)}
  .pad.lit{opacity:1;box-shadow:0 0 22px 4px currentColor, 0 6px 0 rgba(0,0,0,.35);transform:scale(1.03)}
  .p0{background:#e63946;color:#ff8d96}.p1{background:#457b9d;color:#a9d2ec}.p2{background:#ffd166;color:#fff0c0}.p3{background:#06d6a0;color:#9bffe2}
  .screen.shake{animation:scs .3s}@keyframes scs{0%,100%{transform:translateX(0)}33%{transform:translateX(-7px)}66%{transform:translateX(7px)}}
  /* Story-Outro: Reaktion auf dem Reveal (tap-getaktet) — unten am Schirm, verdeckt NIE das Gesicht */
  .storyOut{position:absolute;left:50%;bottom:8px;transform:translateX(-50%);background:rgba(6,12,28,.86);color:#eaf1ff;font-weight:800;font-size:14px;padding:9px 14px;border-radius:12px;box-shadow:0 6px 16px rgba(0,0,0,.45);opacity:0;transition:opacity .4s ease .5s;z-index:5;max-width:92%;text-align:center;pointer-events:none}
  .storyOut.on{opacity:1}
  .storyOut.on::after{content:" ▸";opacity:.7;animation:blinkA 1.2s infinite} /* Tap-Affordanz */
  @keyframes blinkA{50%{opacity:.15}}
  #tippBtn.nudge{animation:tnudge 1.1s ease-in-out infinite;opacity:1} /* Idle-Nudge: Tipp-Knopf pulst, wenn die Jüngsten zu lange nichts tippen */
  @keyframes tnudge{50%{transform:scale(1.09);box-shadow:0 0 16px 3px rgba(255,209,102,.75)}}
  /* Reveal */
  .invite{width:100%;background:linear-gradient(170deg,#eef3ff,#cdd9f7);color:var(--ink);border-radius:20px;padding:22px;box-shadow:0 14px 40px rgba(0,0,0,.45);text-align:center;border:3px solid var(--accent-dk)}
  .hero{width:144px;height:144px;border-radius:50%;margin:0 auto 6px;border:5px solid var(--accent);background-image:var(--photo);background-size:cover;background-position:center;background-color:#1a1f33;box-shadow:0 8px 20px rgba(0,0,0,.3);position:relative;animation:pop .6s cubic-bezier(.3,1.5,.5,1)}
  .hero::after{content:"🦸";position:absolute;bottom:-8px;right:-8px;font-size:38px}
  @keyframes pop{from{transform:scale(.3) rotate(-8deg);opacity:0}to{transform:none;opacity:1}}
  .invite h2{font-size:23px;margin:6px 0 2px}.invite .who{font-size:17px;font-weight:800;color:var(--accent-dk)}
  .invite dl{display:grid;grid-template-columns:auto 1fr;gap:8px 12px;text-align:left;margin:14px auto;max-width:240px;font-size:16px}.invite dt{font-size:20px}.invite dd{font-weight:700}
</style>
</head>
<body>
<div class="demoTag">PROTOTYP · Helden-Signal (E11 Simon)</div>
<div class="wrap">
  <section class="scene on" id="s-intro">
    <div class="big" id="pIcon">📡</div>
    <h1 id="pTitle">Funkspruch für dich!</h1>
    <p class="sub" id="pText">…</p>
    <button class="btn" id="nextPan">Weiter ▸</button>
    <button class="btn" id="skipPan" style="background:rgba(255,255,255,.16);font-size:14px;padding:8px 20px">Überspringen ▸▸</button>
    <div id="introForm" style="width:100%;flex-direction:column;align-items:center;gap:12px;display:none">
      <input id="gname" placeholder="Dein Name (optional)" maxlength="20" autocomplete="off" style="width:80%;max-width:240px;padding:11px 14px;border:0;border-radius:12px;font-size:16px;text-align:center;background:rgba(255,255,255,.92);color:#2a2a2a;outline:none">
      <button class="btn" id="startBtn">Funk empfangen 📡</button>
    </div>
  </section>

  <section class="scene" id="s-game">
    <div class="level"><span class="pill" style="background:rgba(0,0,0,.3);padding:6px 12px;border-radius:999px">Signal <b id="lvl">1</b>/<b id="lvlmax">5</b></span></div>
    <div class="screen" id="screen"><div class="pic"></div><div class="msg" id="msg">Achtung — Signal kommt …</div><div class="storyOut" id="storyOut"></div></div>
    <div class="pad-wrap">
      <button class="pad p0" data-i="0">⚡</button>
      <button class="pad p1" data-i="1">🛡️</button>
      <button class="pad p2" data-i="2">⭐</button>
      <button class="pad p3" data-i="3">💥</button>
    </div>
    <button class="btn" id="tippBtn" style="background:rgba(255,255,255,.16);font-size:15px;padding:8px 20px">💡 Tipp</button>
  </section>

  <section class="scene" id="s-win">
    <div class="invite">
      <div class="hero"></div>
      <h2 id="winTitle">Identität entschlüsselt!</h2>
      <p class="who" id="winWho">Identität entschlüsselt! Komm zur Helden-Party:</p>
      <dl><dt>📅</dt><dd>Samstag, 11. Juli</dd><dt>🕒</dt><dd>15:00 Uhr</dd><dt>📍</dt><dd>Geheim-Hauptquartier</dd></dl>
      <button class="btn ja" id="rsvpBtn">🦸 Ich rette mit!</button>
      <p class="note">(Demo — im Original geht die Zusage per WhatsApp an die Eltern)</p>
    </div>
  </section>
</div>
<div class="confetti" id="confetti"></div>
<script src="core/core.js?v=20260708"></script>
<script>
const NOPHOTO="data:image/svg+xml,"+encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><rect width='200' height='200' fill='#1a2350'/><path d='M100 40 C70 40 52 52 52 52 C52 110 72 150 100 164 C128 150 148 110 148 52 C148 52 130 40 100 40Z' fill='#ffd166' stroke='#c4961a' stroke-width='4'/><path d='M100 70 l10 24 h-20z' fill='#e63946'/><path d='M100 122 l-12 -26 h24z' fill='#e63946'/><circle cx='100' cy='98' r='9' fill='#1a2350'/></svg>`);
const THEME={ photo:'/birthday-photo.jpg' };
const HAS_PHOTO=setPhoto(THEME,NOPHOTO);
const CC=['#e63946','#457b9d','#ffd166','#fff','#06d6a0'];
const TONES=[330,392,494,587];
const sfx={
  tone(i){const t=AC().currentTime;note(TONES[i],t,0.22,{type:'square',vol:0.12});note(TONES[i]*2,t,0.18,{type:'sine',vol:0.04});},
  buzz(){const t=AC().currentTime;note(150,t,0.28,{type:'sawtooth',vol:0.14,glideTo:80});},
  win(){const t=AC().currentTime;[523,659,784,1047,1319].forEach((f,i)=>note(f,t+i*0.1,0.34,{type:'triangle',vol:0.14}));},
  ding(){const t=AC().currentTime;note(880,t,0.12,{type:'sine',vol:0.15});note(1320,t+0.09,0.24,{type:'sine',vol:0.13});}
};
const GOAL=(ageNum()<=6?3:ageNum()<=9?4:5), FLASH_MS=520; // Länge nach Alter (4–6→3, 7–9→4, 10+→5)
let seq=[], step=0, accepting=false, done=false, pads=[];
let outroStep=0, outroT=null, beat2='', winAt=0, idleT=null;
const GUEST=(()=>{ const s=(new URLSearchParams(location.search).get('g')||'').trim(); return s.length<=20?s:''; })(); // Gastname für den Twist-Beat; >20 verwerfen
function kidCap(){ const k=kid(); return k.charAt(0).toUpperCase()+k.slice(1); } // Fallback 'das Geburtstagskind' satzinitial groß
function guestNow(){ const f=document.getElementById('gname'); const v=((f&&f.value)||'').trim(); return (v&&v.length<=20)?v:GUEST; } // Namensfeld vor URL-Param
// Story-Intro: 3 tippbare Panels — falsche Fährte (wer steckt dahinter?) fürs Twist-Finale; geschlechtsneutral
const PANELS=[
  {i:'📡',t:'Funkspruch für dich!',x:'Die Leitzentrale funkt ein geheimes Signal — dahinter verbirgt sich eine echte Heldin oder ein echter Held. Aber der Code ist noch verschlüsselt!'},
  {i:'🎧',t:'Hör gut zu!',x:'Achte auf die Signalfolge und tippe sie nach — mit jedem richtigen Signal wird das Bild auf dem Schirm klarer.'},
  {i:'🦸',t:'Wer steckt dahinter?',x:'Wenn der Code geknackt ist, zeigt der Schirm, wer die geheime Identität ist.'}
];
let pIdx=0;
function showPan(){ const p=PANELS[pIdx]; $('#pIcon').textContent=p.i; $('#pTitle').textContent=p.t; $('#pText').textContent=p.x; const last=pIdx>=PANELS.length-1; $('#nextPan').style.display=last?'none':''; $('#skipPan').style.display=last?'none':''; $('#introForm').style.display=last?'flex':'none'; }
function sharpen(frac){ const p=$('#screen').querySelector('.pic'); if(!p)return; const f=Math.max(0,Math.min(1,frac)); p.style.opacity=(f<=0?0:(0.2+0.8*f*f)).toFixed(2); p.style.filter='blur('+(16*(1-f*f)).toFixed(1)+'px) saturate('+(0.55+0.45*f).toFixed(2)+')'; } /* Blur hinten gewichtet (1-f^2) */
function flash(i){ const p=pads[i]; p.classList.add('lit'); sfx.tone(i); setTimeout(()=>p.classList.remove('lit'),FLASH_MS*0.55); }
function nextRound(){ seq.push(Math.floor(Math.random()*4)); step=0; $('#lvl').textContent=seq.length; playSeq(); }
function armIdle(){ clearTimeout(idleT); idleT=setTimeout(()=>{ if(accepting&&!done){ $('#tippBtn').classList.add('nudge'); $('#msg').textContent='Kein Signal erkannt? Drück auf 💡 Tipp!'; } }, 8000); } // Idle-Nudge: nach 8s ohne Eingabe pulst der Tipp-Knopf -> auch ohne Elternhilfe weiter (Jüngste)
function clearNudge(){ clearTimeout(idleT); $('#tippBtn').classList.remove('nudge'); }
function playSeq(){
  accepting=false; step=0; clearNudge(); $('#msg').textContent='Achtung — Signal kommt …'; // step-Reset: bei Replay nach Fehltipp wieder von vorn prüfen, sonst Desync-Endlosschleife
  let i=0; const iv=setInterval(()=>{ if(done){clearInterval(iv);return;} if(i>=seq.length){ clearInterval(iv); accepting=true; $('#msg').textContent='Jetzt du — tippe die Folge!'; armIdle(); return; } flash(seq[i]); i++; }, FLASH_MS);
}
function press(i){
  if(!accepting||done)return;
  clearNudge();
  flash(i);
  if(i===seq[step]){
    step++;
    if(step===seq.length){
      accepting=false;
      if(seq.length>=GOAL){ return win(); }
      sharpen(seq.length/GOAL); $('#msg').textContent='Bild klarer! Nächstes Signal …'; setTimeout(nextRound,750);
    } else { $('#msg').textContent='Jetzt du — tippe die Folge!'; armIdle(); } // korrekter Teil-Tap: Idle-Timer neu starten, Nudge-Text weg
  } else {
    accepting=false; sfx.buzz(); vib([30,40,30]);
    $('#screen').classList.add('shake'); setTimeout(()=>$('#screen').classList.remove('shake'),300);
    $('#msg').textContent='Fehlsignal — nochmal hören!'; setTimeout(playSeq,850);
  }
}
function win(){
  done=true; clearNudge(); sharpen(1); $('#screen').classList.add('reveal'); sfx.win(); vib([20,40,20,40,80]); confetti(CC); // Fanfare + Konfetti AM Reveal
  $('#msg').textContent=''; // Gesicht-Guard: kein zentraler Text übers Foto — Beats laufen unten via storyOut
  [...document.querySelectorAll('#s-game button, #s-game .level')].forEach(b=>b.style.visibility='hidden'); // keine toten Buttons/HUD im Reveal
  const g=guestNow(); const so=$('#storyOut');
  if(HAS_PHOTO){ so.textContent='Code geknackt — die geheime Identität ist '+kid()+'! 🎉'; beat2=kidCap()+' funkt zurück: „Na endlich'+(g?', '+g:'')+'! Auf dich hab ich gewartet!“'; } // Beat 1 Identität, Beat 2 Rollenumkehr
  else { so.textContent='Das Helden-Emblem leuchtet auf! 🎉'; beat2='Und '+kid()+' wartet im Hauptquartier auf dich'+(g?', '+g:'')+'!'; } // nofoto: kid() als Gastgeber (kein Spiel-Verb)
  so.classList.add('on'); winAt=Date.now(); outroStep=1; outroT=setTimeout(advanceOutro,11000);
  if(HAS_PHOTO){ $('#winTitle').textContent='Auftrag erfüllt!'; $('#winWho').textContent=`Du hast das Signal entschlüsselt! ${kidCap()} lädt dich zur Helden-Party ein:`; } else { $('#winTitle').textContent='Auftrag erfüllt!'; $('#winWho').textContent=`Du hast den Code geknackt! ${kidCap()} lädt dich zur Helden-Party ein:`; } guestName(); // Titel entkoppelt (kein doppeltes „entschlüsselt/geknackt"); beide Pfade: Gast-Lob + kid() als Gastgeber
}
function advanceOutro(){ if(!outroStep || Date.now()-winAt<1150)return; clearTimeout(outroT); winAt=Date.now(); // Grace 1150ms: kein Reflex-Tap überspringt Reveal+Beat 1
  if(outroStep===1){ outroStep=2; $('#storyOut').textContent=beat2; vib(8); outroT=setTimeout(advanceOutro,14000); }
  else { outroStep=0; show('s-win'); } } // tap-getaktet (Fallback Beat 1 11s, Beat 2 14s)
pads=[...document.querySelectorAll('.pad')];
pads.forEach((p,i)=>p.addEventListener('click',()=>press(+p.dataset.i)));
$('#nextPan').addEventListener('click',()=>{ if(pIdx<PANELS.length-1){ pIdx++; showPan(); } });
$('#skipPan').addEventListener('click',()=>{ pIdx=PANELS.length-1; showPan(); });
$('#screen').addEventListener('click',()=>{ if(done && outroStep){ advanceOutro(); } }); // im Finale taktet der Tap auf den Schirm die Story-Beats — Pads/Tipp liegen außerhalb #screen, also kein Bubble-Doppel-Advance
$('#startBtn').addEventListener('click',()=>{ AC(); seq=[];step=0;done=false;accepting=false;outroStep=0;clearTimeout(outroT);clearNudge();$('#storyOut').classList.remove('on');$('#msg').textContent='Achtung — Signal kommt …';[...document.querySelectorAll('#s-game button, #s-game .level')].forEach(b=>b.style.visibility='');$('#screen').classList.remove('reveal');sharpen(0);$('#lvlmax').textContent=GOAL;$('#lvl').textContent=1;show('s-game');setTimeout(nextRound,500); }); // AC(): iOS-Audio-Unlock per Geste
showPan();
$('#tippBtn').addEventListener('click',()=>{ if(accepting && !done) press(seq[step]); }); // Tipp: naechstes richtiges Signal
$('#rsvpBtn').addEventListener('click',e=>{e.target.textContent='Zusage gesendet ✓';e.target.disabled=true;confetti(CC);sfx.ding();});
</script>
</body>
</html>
