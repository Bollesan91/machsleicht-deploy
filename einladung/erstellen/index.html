<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="192x192" href="/favicon-192x192.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="canonical" href="https://machsleicht.de/einladung/erstellen">
<title>Einladung erstellen | machsleicht.de</title>
<meta name="description" content="Erstelle eine individuelle Einladung f&uuml;r den Kindergeburtstag — 10 Mottos von Piraten bis Einhorn. Kostenlos, direkt im Browser, per WhatsApp verschicken.">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1a2e;
    color: #fff;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: linear-gradient(145deg, #2a2a4a, #1e1e3a);
    border-radius: 20px;
    padding: 32px 28px;
    max-width: 400px;
    width: 90%;
    box-shadow: 0 20px 60px rgba(0,0,0,.4);
    border: 1px solid rgba(255,255,255,.06);
  }
  .header { text-align: center; margin-bottom: 28px; }
  .header .emoji { font-size: 48px; margin-bottom: 8px; }
  .header h1 { font-size: 20px; font-weight: 800; color: #FFD700; }
  .header p { font-size: 13px; color: rgba(255,255,255,.5); margin-top: 4px; }
  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,.5);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .field input {
    width: 100%;
    padding: 12px 14px;
    background: rgba(255,255,255,.07);
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 10px;
    color: #fff;
    font-size: 15px;
    outline: none;
    transition: border-color .2s;
  }
  .field input:focus {
    border-color: #FFD700;
    background: rgba(255,215,0,.05);
  }
  .field input::placeholder { color: rgba(255,255,255,.25); }
  .row { display: flex; gap: 12px; }
  .row .field { flex: 1; }
  .btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #FFD700, #FFA500);
    color: #1a1a2e;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    margin-top: 8px;
    transition: transform .1s, box-shadow .2s;
  }
  .btn:active { transform: scale(.97); }
  .btn:disabled { opacity: .5; cursor: not-allowed; }

  /* Motto-Picker */
  .motto-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 4px; }
  .motto-btn {
    padding: 12px 8px;
    background: rgba(255,255,255,.07);
    border: 2px solid rgba(255,255,255,.1);
    border-radius: 12px;
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    text-align: center;
  }
  .motto-btn:hover { border-color: rgba(255,255,255,.25); }
  .motto-btn.active { border-color: #FFD700; background: rgba(255,215,0,.08); }
  .motto-btn .motto-emoji { font-size: 24px; display: block; margin-bottom: 4px; }

  /* Ergebnis */
  .result { display: none; text-align: center; margin-top: 20px; }
  .result.show { display: block; }
  .result-link {
    background: rgba(255,255,255,.07);
    border: 1px solid rgba(255,215,0,.3);
    border-radius: 10px;
    padding: 14px;
    margin: 12px 0;
    word-break: break-all;
    font-size: 14px;
    color: #FFD700;
    font-weight: 600;
  }
  .result-actions { display: flex; gap: 10px; margin-top: 12px; }
  .result-actions button {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
  }
  .btn-copy { background: rgba(255,255,255,.1); color: #fff; }
  .btn-wa { background: #25D366; color: #fff; }
  .btn-preview { background: rgba(255,215,0,.15); color: #FFD700; margin-top: 8px; display: block; width: 100%; padding: 10px; border-radius: 10px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; }

  /* Foto-Upload */
  .foto-zone {
    border: 2px dashed rgba(255,215,0,.25); border-radius: 14px;
    padding: 16px; text-align: center; cursor: pointer;
    transition: border-color .2s; margin-bottom: 16px;
  }
  .foto-zone:active { border-color: rgba(255,215,0,.5); }
  .foto-zone .fz-icon { font-size: 28px; margin-bottom: 4px; }
  .foto-zone p { font-size: 13px; font-weight: 600; color: rgba(255,255,255,.5); margin: 0; }
  .foto-zone small { font-size: 11px; color: rgba(255,255,255,.25); }
  .footer { text-align: center; margin-top: 20px; }
  .footer a { color: rgba(255,255,255,.2); font-size: 10px; text-decoration: none; }
  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: #25D366; color: #fff; padding: 10px 20px; border-radius: 99px;
    font-size: 13px; font-weight: 600; opacity: 0; transition: opacity .3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="emoji" id="headerEmoji">🎉</div>
    <h1 id="headerTitle">Einladung erstellen</h1>
    <p>In 30 Sekunden fertig!</p>
  </div>

  <form id="form" onsubmit="return handleSubmit(event)">
    <div class="field">
      <label>Motto w&auml;hlen</label>
      <div class="motto-grid">
        <button type="button" class="motto-btn" data-motto="piraten" onclick="selectMotto(this)"><span class="motto-emoji">🏴‍☠️</span>Piraten</button>
        <button type="button" class="motto-btn" data-motto="dino" onclick="selectMotto(this)"><span class="motto-emoji">🦕</span>Dino</button>
        <button type="button" class="motto-btn" data-motto="safari" onclick="selectMotto(this)"><span class="motto-emoji">🦁</span>Safari</button>
        <button type="button" class="motto-btn" data-motto="weltraum" onclick="selectMotto(this)"><span class="motto-emoji">🚀</span>Weltraum</button>
        <button type="button" class="motto-btn" data-motto="detektiv" onclick="selectMotto(this)"><span class="motto-emoji">🔍</span>Detektiv</button>
        <button type="button" class="motto-btn" data-motto="superheld" onclick="selectMotto(this)"><span class="motto-emoji">🦸</span>Superheld</button>
        <button type="button" class="motto-btn" data-motto="prinzessin" onclick="selectMotto(this)"><span class="motto-emoji">👑</span>Prinzessin</button>
        <button type="button" class="motto-btn" data-motto="einhorn" onclick="selectMotto(this)"><span class="motto-emoji">🦄</span>Einhorn</button>
        <button type="button" class="motto-btn" data-motto="meerjungfrau" onclick="selectMotto(this)"><span class="motto-emoji">🧜‍♀️</span>Meerjungfrau</button>
        <button type="button" class="motto-btn" data-motto="feuerwehr" onclick="selectMotto(this)"><span class="motto-emoji">🚒</span>Feuerwehr</button>
      </div>
    </div>
    <div class="field">
      <label>Name des Kindes</label>
      <input type="text" id="name" placeholder="z.B. Mattis" required>
    </div>
    <div class="row">
      <div class="field">
        <label>Datum</label>
        <input type="text" id="date" placeholder="z.B. Samstag, 15. Mai" required>
      </div>
      <div class="field">
        <label>Uhrzeit</label>
        <input type="text" id="time" placeholder="z.B. 14:00 - 17:00" required>
      </div>
    </div>
    <div class="field">
      <label>Ort</label>
      <input type="text" id="ort" placeholder="z.B. Volkspark Friedrichshain" required>
    </div>
    <div class="field" id="fotoField" style="display:none">
      <label>Foto vom Geburtstagskind (optional)</label>
      <div class="foto-zone" id="fotoZone" onclick="document.getElementById('fotoInput').click()">
        <div class="fz-icon">📸</div>
        <p>Foto hochladen</p>
        <small>Wird im Spiel als Überraschung enthüllt!</small>
      </div>
      <input type="file" id="fotoInput" accept="image/*" style="display:none" onchange="handleFoto(this)">
      <div id="cropUI" style="display:none;text-align:center">
        <div id="cropCircle" style="position:relative;width:120px;height:120px;border-radius:50%;overflow:hidden;margin:0 auto;border:3px solid rgba(255,215,0,.5);background:#111;touch-action:none;cursor:grab;box-shadow:0 4px 20px rgba(0,0,0,.5)">
          <img id="cropImg" style="position:absolute;transform-origin:0 0;pointer-events:none;user-select:none;-webkit-user-drag:none" draggable="false">
        </div>
        <p style="font-size:11px;color:rgba(255,255,255,.3);margin:6px 0 4px">Verschieben & zoomen</p>
        <div style="display:flex;align-items:center;gap:6px;padding:0 10px;margin-bottom:6px">
          <span style="font-size:12px;opacity:.4">−</span>
          <input type="range" id="zoomSlider" min="100" max="300" value="100" oninput="_setZoom(this.value)" style="flex:1;-webkit-appearance:none;height:3px;background:rgba(255,255,255,.15);border-radius:2px;outline:none">
          <span style="font-size:12px;opacity:.4">+</span>
        </div>
        <div style="display:flex;gap:8px;justify-content:center">
          <button type="button" onclick="document.getElementById('fotoInput').click()" style="background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5);font-size:12px;padding:6px 12px;border-radius:8px;cursor:pointer">📷 Ändern</button>
          <button type="button" onclick="removeFoto()" style="background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5);font-size:12px;padding:6px 12px;border-radius:8px;cursor:pointer">✕ Entfernen</button>
        </div>
      </div>
    </div>
    <div class="field">
      <label>Deine WhatsApp-Nummer (f&uuml;r Zusagen)</label>
      <input type="tel" id="tel" placeholder="z.B. 01701234567" required>
    </div>
    <button type="submit" class="btn" id="submitBtn">🎉 Einladung erstellen</button>
  </form>

  <div class="result" id="result">
    <p style="font-size:14px;color:rgba(255,255,255,.6)">Deine Einladung ist fertig!</p>
    <div class="result-link" id="resultLink"></div>
    <div class="result-actions">
      <button class="btn-copy" onclick="copyLink()">📋 Link kopieren</button>
      <button class="btn-wa" onclick="shareWA()">💬 Per WhatsApp teilen</button>
    </div>
    <button class="btn-preview" onclick="openPreview()">👀 Vorschau ansehen</button>
  </div>

  <div class="footer"><a href="https://machsleicht.de">machsleicht.de</a></div>
</div>
<div class="toast" id="toast">Link kopiert!</div>

<script>
let generatedUrl = '';
let selectedMotto = null;
let fotoBase64 = null;
let _srcCanvas = null;
let _cropX = 0, _cropY = 0, _cropScale = 1, _minScale = 1;
let _dragging = false, _lastPX = 0, _lastPY = 0;
const CROP_SZ = 120;

// === FOTO HANDLING ===
function handleFoto(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      // Vorskalieren auf max 500px (Handy-Fotos sind 4000px+)
      const MAX = 500;
      let sw = img.width, sh = img.height;
      if (sw > MAX || sh > MAX) {
        const r = Math.min(MAX / sw, MAX / sh);
        sw = Math.round(sw * r); sh = Math.round(sh * r);
      }
      const pre = document.createElement('canvas');
      pre.width = sw; pre.height = sh;
      pre.getContext('2d').drawImage(img, 0, 0, sw, sh);
      _srcCanvas = pre;

      _minScale = Math.max(CROP_SZ / sw, CROP_SZ / sh);
      _cropScale = _minScale;
      _cropX = (CROP_SZ - sw * _cropScale) / 2;
      _cropY = (CROP_SZ - sh * _cropScale) / 2;

      const ci = document.getElementById('cropImg');
      ci.src = pre.toDataURL('image/jpeg', 0.8);
      ci.style.width = sw + 'px';
      ci.style.height = sh + 'px';
      _updateCrop();

      const slider = document.getElementById('zoomSlider');
      slider.min = Math.round(_minScale * 100);
      slider.max = Math.round(_minScale * 300);
      slider.value = Math.round(_minScale * 100);

      document.getElementById('fotoZone').style.display = 'none';
      document.getElementById('cropUI').style.display = '';
      _exportCrop();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function _updateCrop() {
  document.getElementById('cropImg').style.transform =
    'translate(' + _cropX + 'px,' + _cropY + 'px) scale(' + _cropScale + ')';
}

function _clampCrop() {
  if (!_srcCanvas) return;
  const w = _srcCanvas.width * _cropScale, h = _srcCanvas.height * _cropScale;
  _cropX = Math.min(0, Math.max(CROP_SZ - w, _cropX));
  _cropY = Math.min(0, Math.max(CROP_SZ - h, _cropY));
}

function _setZoom(val) {
  const ns = val / 100;
  const cx = CROP_SZ / 2, cy = CROP_SZ / 2;
  const ratio = ns / _cropScale;
  _cropX = cx - (cx - _cropX) * ratio;
  _cropY = cy - (cy - _cropY) * ratio;
  _cropScale = ns;
  _clampCrop(); _updateCrop(); _exportCrop();
}

function _exportCrop() {
  if (!_srcCanvas) { fotoBase64 = null; return; }
  const c = document.createElement('canvas');
  c.width = 64; c.height = 64;
  const ctx = c.getContext('2d');
  const sx = -_cropX / _cropScale;
  const sy = -_cropY / _cropScale;
  const sw = CROP_SZ / _cropScale;
  ctx.drawImage(_srcCanvas, sx, sy, sw, sw, 0, 0, 64, 64);
  fotoBase64 = c.toDataURL('image/jpeg', 0.3).split(',')[1];
}

function removeFoto() {
  fotoBase64 = null;
  _srcCanvas = null;
  document.getElementById('fotoInput').value = '';
  document.getElementById('fotoZone').style.display = '';
  document.getElementById('cropUI').style.display = 'none';
}

// Drag
(function() {
  const el = document.getElementById('cropCircle');
  el.addEventListener('pointerdown', function(e) {
    if (!_srcCanvas) return;
    _dragging = true; _lastPX = e.clientX; _lastPY = e.clientY;
    el.setPointerCapture(e.pointerId);
  });
  el.addEventListener('pointermove', function(e) {
    if (!_dragging) return;
    _cropX += e.clientX - _lastPX;
    _cropY += e.clientY - _lastPY;
    _lastPX = e.clientX; _lastPY = e.clientY;
    _clampCrop(); _updateCrop();
  });
  el.addEventListener('pointerup', function() { _dragging = false; _exportCrop(); });
  el.addEventListener('pointercancel', function() { _dragging = false; _exportCrop(); });
})();

const MOTTO_CONFIG = {
  piraten:      { emoji: '\u{1F3F4}\u200D\u2620\uFE0F', label: 'Piraten',      color: '#FFD700' },
  dino:         { emoji: '\u{1F995}',                     label: 'Dino',         color: '#66BB6A' },
  safari:       { emoji: '\u{1F981}',                     label: 'Safari',       color: '#FF9800' },
  weltraum:     { emoji: '\u{1F680}',                     label: 'Weltraum',     color: '#CE93D8' },
  detektiv:     { emoji: '\u{1F50D}',                     label: 'Detektiv',     color: '#78909C' },
  superheld:    { emoji: '\u{1F9B8}',                     label: 'Superheld',    color: '#EF5350' },
  prinzessin:   { emoji: '\u{1F451}',                     label: 'Prinzessin',   color: '#F48FB1' },
  einhorn:      { emoji: '\u{1F984}',                     label: 'Einhorn',      color: '#E1BEE7' },
  meerjungfrau: { emoji: '\u{1F9DC}\u200D\u2640\uFE0F',  label: 'Meerjungfrau', color: '#4DD0E1' },
  feuerwehr:    { emoji: '\u{1F692}',                     label: 'Feuerwehr',    color: '#FF7043' }
};

// URL-Parameter auslesen: ?motto=dino → Dino vorauswählen
(function initMotto() {
  const params = new URLSearchParams(window.location.search);
  const m = params.get('motto');
  if (m && MOTTO_CONFIG[m]) {
    const btn = document.querySelector('[data-motto="' + m + '"]');
    if (btn) selectMotto(btn);
  }
})();

function selectMotto(btn) {
  document.querySelectorAll('.motto-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedMotto = btn.dataset.motto;
  const cfg = MOTTO_CONFIG[selectedMotto];
  document.getElementById('headerEmoji').textContent = cfg.emoji;
  document.getElementById('headerTitle').textContent = cfg.label + '-Einladung erstellen';
  // Foto-Upload nur bei Dino (interaktives Spiel mit Runner)
  document.getElementById('fotoField').style.display = selectedMotto === 'dino' ? '' : 'none';
  if (selectedMotto !== 'dino') removeFoto();
}

async function handleSubmit(e) {
  e.preventDefault();
  if (!selectedMotto) {
    document.querySelector('.motto-grid').style.outline = '2px solid #EF5350';
    document.querySelector('.motto-grid').style.outlineOffset = '4px';
    document.querySelector('.motto-grid').style.borderRadius = '14px';
    setTimeout(() => document.querySelector('.motto-grid').style.outline = 'none', 2000);
    return;
  }
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Wird erstellt...';

  const data = {
    name: document.getElementById('name').value.trim(),
    date: document.getElementById('date').value.trim(),
    time: document.getElementById('time').value.trim(),
    ort: document.getElementById('ort').value.trim(),
    tel: document.getElementById('tel').value.trim().replace(/[^0-9+]/g, ''),
    motto: selectedMotto
  };
  if (fotoBase64) data.foto = fotoBase64;

  // Telefonnummer normalisieren: 0170... -> 49170...
  if (data.tel.startsWith('0')) data.tel = '49' + data.tel.slice(1);
  if (data.tel.startsWith('+')) data.tel = data.tel.slice(1);

  try {
    const res = await fetch('/.netlify/functions/create-invite', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    const result = await res.json();
    if (!res.ok) throw new Error(result.error || 'Fehler');

    generatedUrl = window.location.origin + '/e/' + result.slug;
    // Foto als separaten Query-Param anhängen (nicht im Slug)
    if (result.fotoParam) {
      generatedUrl += '?foto=' + encodeURIComponent(result.fotoParam);
    }
    document.getElementById('resultLink').textContent = generatedUrl;
    document.getElementById('result').classList.add('show');
    document.getElementById('form').style.display = 'none';
  } catch (err) {
    alert('Fehler: ' + err.message);
    btn.disabled = false;
    btn.textContent = '\u{1F389} Einladung erstellen';
  }
}

function copyLink() {
  navigator.clipboard.writeText(generatedUrl).then(() => {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  });
}

function shareWA() {
  const name = document.getElementById('name').value.trim();
  const cfg = MOTTO_CONFIG[selectedMotto];
  const msg = encodeURIComponent(
    cfg.emoji + ' Du bist eingeladen zu ' + name + 's ' + cfg.label + '-Geburtstag!\n\n' +
    '\u{1F449} \u00D6ffne deine Einladung hier:\n' + generatedUrl
  );
  window.open('https://wa.me/?text=' + msg, '_blank');
}

function openPreview() {
  window.open(generatedUrl, '_blank');
}
</script>
</body>
</html>
